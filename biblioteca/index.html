  E24: { legenda:"No fim do dia, as pessoas esquecem muitos detalhes.\n\nMas dificilmente esquecem como foram tratadas.\n\nEsse é o verdadeiro legado de uma clínica.", carrossel:["Que marca sua clínica deixa?", "Resultados importam.", "Experiências também.", "Pacientes lembram de sentimentos.", "Confiança gera lembrança.", "Cuidado gera vínculo.", "Vínculo gera indicação.", "Esse é o verdadeiro legado."], reels:"\"Qual será a lembrança que seu paciente terá da sua clínica daqui a cinco anos?\"", stories:["Como você gostaria que seus pacientes lembrassem da sua clínica?", "Experiência também constrói legado."], whatsapp:"Olá!\n\nEsperamos que sua experiência conosco tenha sido marcante.\n\nObrigado por confiar em nosso trabalho.", prompt:"Crie conteúdos mostrando como experiências positivas constroem o legado de uma clínica." },
  E25: { legenda:"Nenhuma clínica alcança excelência de uma vez.\n\nEla evolui em ciclos.\n\nConhece melhor seus pacientes.\n\nOrganiza seus processos.\n\nFortalece relacionamentos.\n\nE continua evoluindo.\n\nEsse é o Método CORE.\n\nE esse ciclo nunca termina.", carrossel:["O Método CORE é um ciclo.", "Conhecimento do Cliente.", "Excelência Operacional.", "Relacionamento e Fidelização.", "Evolução e Experiência.", "Cada etapa fortalece a próxima.", "Quando o ciclo recomeça, a clínica evolui novamente.", "Experiência não é destino.\n\nÉ um processo contínuo."], reels:"\"Depois de percorrer os quatro pilares do Método CORE, talvez você tenha percebido uma coisa: experiência do paciente não é um projeto com começo, meio e fim. Ela é um ciclo contínuo de melhoria.\"", stories:["O CORE não é uma checklist.", "É um ciclo de evolução.", "Quanto mais você aplica, melhor fica a experiência do seu paciente."], whatsapp:"Olá!\n\nObrigado por fazer parte da nossa jornada.\n\nSeguiremos evoluindo continuamente para oferecer uma experiência cada vez melhor.\n\nConte sempre conosco.", prompt:"Crie conteúdos explicando o Método CORE como um ciclo contínuo de melhoria da experiência do paciente, conectando os quatro pilares e incentivando a aplicação prática da metodologia." },
  O01: { legenda:"Existe uma pergunta que toda clínica deveria fazer:\n\nÉ fácil agendar uma consulta com a gente?\n\nParece simples.\n\nMas basta um processo complicado para o paciente desistir antes mesmo de conhecer o profissional.\n\nLigações que não atendem.\n\nMensagens que demoram.\n\nRespostas automáticas que não resolvem.\n\nHorários difíceis de encontrar.\n\nTudo isso desgasta a experiência.\n\nO paciente não compara sua clínica apenas com outra clínica.\n\nEle compara com a facilidade que tem para pedir comida, chamar um carro ou comprar qualquer coisa pelo celular.\n\nQuanto mais simples for o agendamento, maior será a chance de transformar interesse em consulta.\n\nPorque experiência também é facilitar a vida das pessoas.\n\nSe você tentasse agendar uma consulta na sua própria clínica hoje, conseguiria em menos de cinco minutos?", carrossel:["Seu paciente desiste antes mesmo da consulta?", "Talvez o problema esteja no agendamento.", "Quanto mais difícil...", "Maior a desistência.", "Agendar precisa ser simples.", "Rápido.", "Sem burocracia.", "Facilidade também faz parte da experiência."], reels:"\"Você sabia que muitos pacientes desistem antes mesmo da primeira consulta?\n\nNão porque mudaram de ideia.\n\nMas porque o processo de agendamento foi complicado.\n\nSe demorar para responder...\n\nSe precisar ligar várias vezes...\n\nSe o paciente não encontrar um horário...\n\nEle simplesmente procura outra clínica.\n\nExperiência começa muito antes da consulta.\n\nEla começa quando alguém tenta marcar um horário.\"", stories:["Você já desistiu de comprar alguma coisa porque era complicado?\n\n⬜ Sim\n\n⬜ Muitas vezes", "Os pacientes fazem exatamente a mesma coisa.", "Facilite o primeiro contato."], whatsapp:"Olá!\n\nQue bom falar com você.\n\nSerá um prazer receber você em nossa clínica.\n\nInforme o melhor dia e horário para o seu atendimento que verificaremos a disponibilidade e responderemos o mais rápido possível.", prompt:"Crie uma legenda para Instagram mostrando como um processo simples de agendamento melhora a experiência do paciente e aumenta a conversão de novos atendimentos." },
  O02: { legenda:"Hoje o WhatsApp deixou de ser apenas um aplicativo.\n\nEle virou a recepção da clínica.\n\nÉ por ele que o paciente tira dúvidas.\n\nAgenda consultas.\n\nCancela horários.\n\nPede informações.\n\nE cria a primeira impressão sobre sua equipe.\n\nPor isso, responder rápido não basta.\n\nÉ preciso responder bem.\n\nCom clareza.\n\nCom simpatia.\n\nCom atenção.\n\nCada conversa constrói confiança.\n\nOu destrói.\n\nNo final, o paciente não lembra apenas da resposta.\n\nEle lembra da forma como foi atendido.\n\nSe você lesse as últimas dez conversas da sua clínica, teria orgulho delas?", carrossel:["O WhatsApp virou a recepção da clínica.", "É o primeiro contato.", "A primeira impressão.", "O primeiro atendimento.", "Responda com atenção.", "Com clareza.", "Com empatia.", "Cada mensagem comunica."], reels:"\"Existe uma recepção que funciona 24 horas por dia.\n\nO WhatsApp.\n\nÉ nele que o paciente decide se continua conversando...\n\nOu procura outra clínica.\n\nPor isso, cada mensagem merece atenção.\"", stories:["Quanto tempo sua clínica demora para responder?", "Rapidez importa.\n\nMas atenção também.", "Leia suas últimas conversas hoje."], whatsapp:"Olá!\n\nObrigado por entrar em contato.\n\nRecebemos sua mensagem e nossa equipe responderá o mais breve possível.\n\nEnquanto isso, se desejar, envie sua dúvida para agilizar o atendimento.", prompt:"Crie uma legenda para Instagram mostrando que o WhatsApp é a recepção digital da clínica e influencia diretamente a experiência do paciente." },
  O03: { legenda:"Vivemos em um mundo onde tudo acontece rápido.\n\nE isso mudou também a expectativa dos pacientes.\n\nQuando alguém envia uma mensagem para uma clínica...\n\nNão espera apenas uma resposta.\n\nEspera atenção.\n\nDemorar horas ou dias para responder pode transmitir uma sensação de desinteresse.\n\nMesmo que essa não seja a intenção.\n\nTempo de resposta é experiência.\n\nNão porque o paciente tenha pressa.\n\nMas porque ele quer sentir que foi ouvido.\n\nResponder rápido demonstra respeito.\n\nResponder bem demonstra cuidado.\n\nOs dois precisam caminhar juntos.\n\nQuanto tempo sua clínica leva para responder uma nova mensagem?", carrossel:["Tempo de resposta também é atendimento.", "Responder rápido demonstra atenção.", "Mas responder bem...", "Constrói confiança.", "O paciente percebe.", "O paciente compara.", "O paciente decide.", "Sua clínica responde no tempo certo?"], reels:"\"Imagine enviar uma mensagem para uma clínica.\n\nPassam duas horas.\n\nNada.\n\nPassa um dia.\n\nNada.\n\nQual a sensação?\n\nProvavelmente você procuraria outra.\n\nTempo de resposta influencia diretamente a experiência.\"", stories:["Você gosta de esperar resposta?\n\n⬜ Não\n\n⬜ Nunca", "Seus pacientes também não.", "Tempo comunica interesse."], whatsapp:"Olá!\n\nRecebemos sua mensagem.\n\nEstamos verificando sua solicitação e retornaremos em instantes.\n\nObrigado pela compreensão.", prompt:"Crie uma legenda mostrando como o tempo de resposta influencia a confiança e a experiência do paciente." },
  O04: { legenda:"Esperar faz parte da rotina de qualquer clínica.\n\nO problema nunca foi a espera.\n\nO problema é o silêncio.\n\nQuando ninguém explica.\n\nQuando ninguém atualiza.\n\nQuando o paciente fica sem saber o que está acontecendo.\n\nUm atraso informado é compreendido.\n\nUm atraso ignorado gera frustração.\n\nExperiência do paciente também significa respeitar o tempo das pessoas.\n\nMesmo quando imprevistos acontecem.\n\nSua equipe comunica os atrasos ou espera o paciente reclamar?", carrossel:["Esperar não é o maior problema.", "O problema é esperar sem informação.", "Comunique.", "Atualize.", "Peça desculpas.", "Explique.", "Respeite o paciente.", "Comunicação reduz a insatisfação."], reels:"\"Já percebeu que algumas pessoas entendem atrasos?\n\nElas entendem.\n\nO que ninguém entende é ficar esperando sem qualquer informação.\n\nUma simples atualização muda completamente a experiência.\"", stories:["Você prefere esperar...\n\n⬜ Sabendo o motivo\n\n⬜ Sem explicação", "A resposta é óbvia.", "Comunique mais."], whatsapp:"Olá!\n\nGostaríamos de informar que houve um pequeno atraso em nossa agenda.\n\nPedimos desculpas e agradecemos pela compreensão.\n\nEstamos trabalhando para atendê-lo o mais rápido possível.", prompt:"Crie uma legenda mostrando como informar atrasos melhora a experiência do paciente e reduz conflitos." },
  O05: { legenda:"Uma confirmação de consulta parece apenas um lembrete.\n\nMas ela comunica muito mais do que isso.\n\nComunica organização.\n\nComunica cuidado.\n\nComunica que aquele paciente é esperado.\n\nAlém de reduzir faltas, uma boa confirmação transmite segurança.\n\nPorque ninguém gosta de ficar na dúvida se está tudo certo.\n\nPequenos processos fazem grandes diferenças.\n\nSua clínica confirma consultas apenas para reduzir faltas ou para demonstrar cuidado também?", carrossel:["Confirmar consulta vai além de lembrar.", "É demonstrar organização.", "É transmitir cuidado.", "É reduzir faltas.", "É aumentar confiança.", "Tudo isso melhora a experiência.", "Pequenos detalhes importam.", "Sua confirmação comunica o quê?"], reels:"\"Confirmar uma consulta não serve apenas para lembrar o paciente.\n\nServe para mostrar que ele é esperado.\n\nE isso muda completamente a percepção da experiência.\"", stories:["Sua clínica confirma consultas?\n\n⬜ Sim\n\n⬜ Não", "Lembrar também é cuidar.", "Pequenos detalhes fazem diferença."], whatsapp:"Olá!\n\nEstamos passando para confirmar sua consulta no dia [data], às [horário].\n\nCaso precise reagendar, basta responder esta mensagem.\n\nSerá um prazer recebê-lo.", prompt:"Crie uma legenda mostrando como a confirmação de consultas melhora a organização da clínica e transmite cuidado ao paciente." },
  O06: { legenda:"Quando um paciente cancela uma consulta, a maioria das clínicas pensa na agenda.\n\nEu penso no relacionamento.\n\nPorque um cancelamento raramente acontece por acaso.\n\nPode ter sido um imprevisto.\n\nUma dificuldade financeira.\n\nUma insegurança.\n\nOu simplesmente uma experiência que não gerou confiança suficiente.\n\nPor isso, cancelar não deveria encerrar a conversa.\n\nDeveria iniciar uma nova.\n\nPerguntar se está tudo bem.\n\nEntender o motivo.\n\nOferecer uma nova data.\n\nMostrar interesse.\n\nToda clínica perde pacientes.\n\nMas muitas os perdem porque nunca mais entram em contato.\n\nQuando um paciente cancela, sua clínica reage ou simplesmente segue a rotina?", carrossel:["Cancelamento não é o fim.", "É um sinal.", "Pode ser insegurança.", "Pode ser um imprevisto.", "Converse.", "Entenda o motivo.", "Ofereça uma solução.", "Relacionamento continua depois do cancelamento."], reels:"\"Quando um paciente cancela...\n\nVocê pensa apenas na agenda?\n\nOu tenta entender o motivo?\n\nToda desistência traz uma informação importante.\n\nQuem aprende com ela...\n\nMelhora a experiência.\"", stories:["Quando alguém cancela...\n\n⬜ Você pergunta o motivo?\n\n⬜ Apenas reage?", "Cancelar também gera aprendizado.", "Relacionamento continua."], whatsapp:"Olá!\n\nRecebemos seu pedido de cancelamento.\n\nEsperamos que esteja tudo bem.\n\nSe desejar remarcar sua consulta ou precisar de qualquer orientação, estaremos à disposição para ajudar.", prompt:"Crie uma legenda para Instagram mostrando que cancelamentos devem ser tratados como oportunidades para fortalecer o relacionamento com o paciente." },
  O07: { legenda:"Toda falta gera um prejuízo.\n\nMas nem sempre financeiro.\n\nEla representa um horário perdido.\n\nUma oportunidade desperdiçada.\n\nUm paciente que talvez esteja se afastando.\n\nAntes de tentar reduzir faltas...\n\nFaça uma pergunta:\n\nPor que elas acontecem?\n\nFoi esquecimento?\n\nFoi dificuldade para chegar?\n\nFoi medo?\n\nFoi falta de confirmação?\n\nQuem entende as causas consegue agir de forma inteligente.\n\nPorque combater o efeito sem entender a causa raramente resolve o problema.\n\nSua clínica mede os motivos das faltas ou apenas registra que o paciente não compareceu?", carrossel:["Faltas têm causas.", "Descubra quais são.", "Esquecimento.", "Medo.", "Imprevistos.", "Comunicação.", "Cada motivo pede uma solução.", "Você conhece os motivos das faltas?"], reels:"\"Você quer reduzir faltas?\n\nEntão pare de olhar apenas para a agenda.\n\nComece olhando para o comportamento.\n\nToda falta conta uma história.\n\nDescubra essa história.\"", stories:["Qual o principal motivo das faltas na sua clínica?", "Você realmente sabe?", "Sem entender a causa...\n\nNão existe solução."], whatsapp:"Olá!\n\nSentimos sua ausência hoje.\n\nEsperamos que esteja tudo bem.\n\nCaso deseje remarcar sua consulta, ficaremos felizes em encontrar um novo horário para você.", prompt:"Crie uma legenda mostrando que reduzir faltas depende de entender os motivos que levam o paciente a não comparecer." },
  O08: { legenda:"Organização não serve apenas para facilitar o trabalho da equipe.\n\nEla transmite confiança.\n\nQuando o paciente percebe processos claros...\n\nInformações organizadas...\n\nAmbientes preparados...\n\nTudo comunica profissionalismo.\n\nPor outro lado...\n\nPapéis perdidos.\n\nInformações desencontradas.\n\nAtrasos frequentes.\n\nTambém comunicam.\n\nA organização é silenciosa.\n\nMas seus efeitos aparecem em toda a experiência.\n\nSe hoje você visitasse sua clínica como paciente, perceberia organização em cada detalhe?", carrossel:["Organização também comunica.", "Ambientes.", "Agenda.", "Equipe.", "Processos.", "Tudo transmite confiança.", "Tudo influencia a experiência.", "Sua clínica parece organizada?"], reels:"\"Organização não serve apenas para a equipe.\n\nEla serve para o paciente.\n\nPorque pacientes percebem muito mais do que imaginamos.\"", stories:["Organização transmite confiança?\n\n⬜ Sim\n\n⬜ Muito", "Pacientes observam tudo.", "Olhe sua clínica com outros olhos."], whatsapp:"Olá!\n\nEstamos organizando seu atendimento para que tudo aconteça da forma mais tranquila possível.\n\nQualquer dúvida, estaremos à disposição.", prompt:"Crie uma legenda mostrando como organização operacional melhora a percepção de qualidade da clínica." },
  O09: { legenda:"Uma experiência excelente não pode depender da sorte.\n\nNem de qual colaborador atendeu o paciente naquele dia.\n\nQuando cada pessoa trabalha de um jeito...\n\nCada paciente vive uma experiência diferente.\n\nPadronizar não significa robotizar.\n\nSignifica garantir um padrão mínimo de qualidade.\n\nCada sorriso.\n\nCada confirmação.\n\nCada orientação.\n\nCada despedida.\n\nTudo pode seguir um padrão.\n\nE isso aumenta a confiança do paciente.\n\nSua clínica entrega a mesma experiência todos os dias?", carrossel:["Excelência precisa ser repetida.", "Não pode depender da sorte.", "Padronize.", "Treine.", "Acompanhe.", "Corrija.", "Repita.", "Consistência gera confiança."], reels:"\"Existe uma pergunta importante.\n\nSe dois pacientes forem atendidos em dias diferentes...\n\nEles viverão a mesma experiência?\n\nSe a resposta for não...\n\nTalvez falte padronização.\"", stories:["Sua equipe atende do mesmo jeito?\n\n⬜ Sim\n\n⬜ Depende", "Experiência precisa de consistência.", "Padronizar não é engessar."], whatsapp:"Olá!\n\nSeguimos um processo de atendimento pensado para oferecer a mesma qualidade em cada etapa da sua jornada.\n\nObrigado pela confiança.", prompt:"Crie uma legenda mostrando como a padronização melhora a experiência do paciente sem perder a humanização." },
  O10: { legenda:"Imagine entrar em um aeroporto onde ninguém sabe para onde você deve ir.\n\nSeria confuso.\n\nÉ exatamente isso que acontece quando uma clínica não possui processos claros.\n\nO paciente chega.\n\nEspera.\n\nPergunta.\n\nVolta.\n\nFica perdido.\n\nFluxo não serve apenas para organizar a equipe.\n\nServe para reduzir atritos.\n\nQuanto menos dúvidas existirem durante a jornada...\n\nMelhor será a experiência.\n\nPorque ninguém gosta de sentir que está perdido.\n\nSeu paciente sabe exatamente qual será o próximo passo?", carrossel:["Fluxos organizam experiências.", "Reduzem dúvidas.", "Reduzem espera.", "Reduzem insegurança.", "Tudo fica mais simples.", "Tudo fica mais claro.", "Tudo melhora.", "Sua clínica possui fluxos definidos?"], reels:"\"Uma clínica organizada faz o paciente saber exatamente o que vai acontecer.\n\nSem perguntas.\n\nSem dúvidas.\n\nSem confusão.\n\nFluxo também é experiência.\"", stories:["Seu paciente sabe qual será o próximo passo?\n\n⬜ Sim\n\n⬜ Nem sempre", "Fluxos reduzem ansiedade.", "Organização gera tranquilidade."], whatsapp:"Olá!\n\nSeu atendimento seguirá as seguintes etapas...\n\n1️⃣ Recepção\n\n2️⃣ Consulta\n\n3️⃣ Orientações finais\n\nCaso tenha dúvidas durante qualquer etapa, conte conosco.", prompt:"Crie uma legenda mostrando como processos e fluxos organizados tornam a experiência do paciente mais simples e agradável." },
  O11: { legenda:"A recepção é o cartão de visitas da sua clínica.\n\nAntes mesmo do paciente conhecer o profissional...\n\nEle conhece a equipe.\n\nÉ ali que ele cria a primeira impressão presencial.\n\nUm sorriso.\n\nUm cumprimento.\n\nOlhar nos olhos.\n\nAgilidade.\n\nOrganização.\n\nTudo isso comunica.\n\nMuitas clínicas investem milhares de reais em equipamentos.\n\nMas esquecem de investir no momento em que o paciente diz:\n\n\"Bom dia.\"\n\nE esse momento pode definir toda a experiência.\n\nPorque atendimento começa na recepção.\n\nNão no consultório.\n\nComo um paciente descreveria a recepção da sua clínica em uma única palavra?", carrossel:["A consulta ainda nem começou...", "Mas a experiência já começou.", "Na recepção.", "No sorriso.", "Na atenção.", "Na organização.", "Receber bem também é cuidar.", "Como sua recepção faz o paciente se sentir?"], reels:"\"Existe um detalhe que muitas clínicas esquecem.\n\nO paciente conhece primeiro a recepção.\n\nDepois conhece o profissional.\n\nPor isso, uma boa experiência começa muito antes da consulta.\"", stories:["Você lembra de uma recepção que te marcou?\n\n⬜ Sim\n\n⬜ Muito", "Seu paciente também lembra.", "Receber bem faz diferença."], whatsapp:"Olá!\n\nEstamos ansiosos para recebê-lo.\n\nNossa equipe preparou tudo para que seu atendimento seja tranquilo e acolhedor.\n\nAté breve!", prompt:"Crie uma legenda mostrando que a recepção é o primeiro contato presencial e influencia toda a experiência do paciente." },
  O12: { legenda:"Mesmo com WhatsApp, muita gente ainda prefere ligar.\n\nE a ligação continua sendo um dos momentos mais importantes da experiência.\n\nÉ nela que o paciente percebe paciência.\n\nInteresse.\n\nEducação.\n\nClareza.\n\nOu percebe exatamente o contrário.\n\nUma ligação não resolve apenas dúvidas.\n\nEla transmite confiança.\n\nPor isso, atender o telefone não deveria ser apenas responder.\n\nDeveria ser acolher.\n\nSua equipe atende chamadas ou cria boas experiências?", carrossel:["Atender o telefone não basta.", "É preciso acolher.", "Escutar.", "Orientar.", "Resolver.", "Transmitir segurança.", "Cada ligação importa.", "Como sua equipe atende?"], reels:"\"Uma ligação pode durar apenas dois minutos.\n\nMas a impressão que ela deixa pode durar anos.\n\nExperiência também acontece pelo telefone.\"", stories:["Você gosta de ligar para empresas?\n\n⬜ Sim\n\n⬜ Só quando preciso", "Então faça valer esse momento.", "Telefone ainda importa."], whatsapp:"Olá!\n\nFoi um prazer conversar com você.\n\nCaso tenha esquecido alguma informação ou surja qualquer dúvida, basta responder esta mensagem.", prompt:"Crie uma legenda mostrando como o atendimento telefônico influencia a confiança dos pacientes." },
  O13: { legenda:"O check-in é um detalhe.\n\nMas detalhes constroem experiências.\n\nQuando o paciente chega e tudo acontece de forma rápida...\n\nEle relaxa.\n\nQuando precisa repetir informações.\n\nEsperar.\n\nPreencher papéis desnecessários.\n\nA experiência começa a ficar pesada.\n\nQuanto menos burocracia...\n\nMais tempo sobra para aquilo que realmente importa.\n\nCuidar das pessoas.\n\nSeu check-in é simples ou cansativo?", carrossel:["Seu check-in facilita?", "Ou cria filas?", "Menos burocracia.", "Mais agilidade.", "Mais conforto.", "Mais organização.", "Mais experiência.", "Simplifique."], reels:"\"O paciente acabou de chegar.\n\nEsse não é o momento de complicar.\n\nQuanto mais simples o check-in...\n\nMelhor a experiência.\"", stories:["Quanto tempo leva seu check-in?", "Tempo também é experiência.", "Observe esse processo hoje."], whatsapp:"Olá!\n\nSua consulta está confirmada.\n\nAo chegar, basta informar seu nome na recepção.\n\nNosso processo foi pensado para ser rápido e simples.", prompt:"Crie uma legenda mostrando como um check-in simples melhora a experiência do paciente." },
  O14: { legenda:"Muitas vezes o paciente percebe um problema que começou dentro da equipe.\n\nInformações desencontradas.\n\nOrientações diferentes.\n\nPessoas que não se comunicam.\n\nQuando a comunicação interna falha...\n\nA experiência externa sofre.\n\nO paciente não deveria perceber os bastidores.\n\nEle deveria perceber organização.\n\nUma equipe alinhada transmite confiança.\n\nUma equipe desorganizada transmite insegurança.\n\nSua equipe conversa entre si ou trabalha em ilhas?", carrossel:["A experiência começa dentro.", "Equipes alinhadas.", "Informações claras.", "Comunicação constante.", "Menos erros.", "Mais confiança.", "Mais qualidade.", "Como sua equipe se comunica?"], reels:"\"Quando a equipe não conversa...\n\nO paciente percebe.\n\nMesmo sem entender o que aconteceu.\n\nComunicação interna também faz parte da experiência.\"", stories:["Sua equipe compartilha informações?\n\n⬜ Sempre\n\n⬜ Às vezes", "Alinhamento evita erros.", "Converse mais."], whatsapp:"Olá!\n\nEstamos acompanhando seu atendimento internamente para garantir que todas as etapas aconteçam da melhor forma possível.\n\nConte conosco.", prompt:"Crie uma legenda mostrando que uma boa comunicação interna melhora diretamente a experiência do paciente." },
  O15: { legenda:"Nenhum processo melhora sozinho.\n\nQuem melhora processos são pessoas.\n\nE pessoas precisam aprender continuamente.\n\nTreinar uma equipe não é um custo.\n\nÉ um investimento na experiência do paciente.\n\nQuanto mais preparada estiver a equipe...\n\nMais segurança transmite.\n\nMais confiança gera.\n\nMais problemas evita.\n\nA melhor tecnologia do mundo nunca substituirá uma equipe bem treinada.\n\nQuando foi o último treinamento realizado na sua clínica?", carrossel:["Experiência começa pelas pessoas.", "Treine.", "Desenvolva.", "Acompanhe.", "Corrija.", "Repita.", "Equipes fortes criam experiências fortes.", "Sua equipe está preparada?"], reels:"\"Se você quer melhorar a experiência...\n\nComece treinando a equipe.\n\nPorque processos não atendem pacientes.\n\nPessoas atendem.\"", stories:["Quando foi o último treinamento?", "Aprender nunca termina.", "Equipe preparada gera confiança."], whatsapp:"Olá!\n\nNossa equipe participa constantemente de treinamentos para oferecer um atendimento cada vez melhor.\n\nObrigado por confiar em nosso trabalho.", prompt:"Crie uma legenda mostrando como treinamentos contínuos fortalecem a experiência do paciente e aumentam a qualidade do atendimento." },
  O16: { legenda:"Muitos gestores acompanham o faturamento da clínica todos os dias.\n\nMas poucos acompanham a experiência do paciente.\n\nVocê mede o número de consultas.\n\nMas mede o tempo de resposta?\n\nMede o tempo de espera?\n\nAs faltas?\n\nOs cancelamentos?\n\nA satisfação?\n\nO retorno dos pacientes?\n\nAquilo que não é medido dificilmente melhora.\n\nPorque a percepção engana.\n\nOs números mostram a realidade.\n\nExperiência também precisa de indicadores.\n\nQuais indicadores de experiência sua clínica acompanha hoje?", carrossel:["O que não é medido...", "Não melhora.", "Tempo de resposta.", "Tempo de espera.", "Cancelamentos.", "Faltas.", "Satisfação.", "Você mede experiência?"], reels:"\"Você mede faturamento?\n\nÓtimo.\n\nAgora me responde...\n\nVocê mede experiência?\n\nPorque aquilo que não é acompanhado acaba sendo decidido no achismo.\"", stories:["Sua clínica acompanha indicadores?\n\n⬜ Sim\n\n⬜ Poucos", "Sem indicadores...\n\nSó existem opiniões.", "Comece medindo o básico."], whatsapp:"Olá!\n\nSua opinião é muito importante para continuarmos evoluindo.\n\nComo você avalia sua experiência conosco de 0 a 10?", prompt:"Crie uma legenda mostrando que indicadores ajudam a melhorar continuamente a experiência do paciente." },
  O17: { legenda:"Uma agenda organizada não beneficia apenas a clínica.\n\nEla beneficia principalmente o paciente.\n\nQuando os horários são distribuídos com inteligência...\n\nA espera diminui.\n\nOs atrasos diminuem.\n\nA equipe trabalha melhor.\n\nO paciente percebe organização.\n\nAgenda cheia não significa agenda eficiente.\n\nUma agenda equilibrada gera uma experiência muito melhor.\n\nSua agenda foi construída pensando apenas na produtividade ou também no paciente?", carrossel:["Agenda cheia não é sinônimo de eficiência.", "Organização importa.", "Menos atrasos.", "Mais tranquilidade.", "Mais qualidade.", "Mais experiência.", "Planejamento faz diferença.", "Como está sua agenda?"], reels:"\"Existe uma diferença entre lotar a agenda...\n\nE organizar a agenda.\n\nQuem pensa apenas em ocupar horários...\n\nAcaba prejudicando a experiência.\"", stories:["Sua agenda vive atrasada?\n\n⬜ Sim\n\n⬜ Não", "Talvez o problema esteja na organização.", "Revise sua agenda."], whatsapp:"Olá!\n\nSua consulta foi organizada para que possamos atendê-lo com tranquilidade e no horário previsto.\n\nNos vemos em breve!", prompt:"Crie uma legenda mostrando como uma boa gestão da agenda melhora a experiência do paciente." },
  O18: { legenda:"Retrabalho custa dinheiro.\n\nMas também custa confiança.\n\nQuando o paciente precisa repetir informações...\n\nQuando precisa voltar porque algo foi esquecido...\n\nQuando recebe orientações diferentes...\n\nA experiência piora.\n\nCada retrabalho revela uma oportunidade de melhoria.\n\nReduzir retrabalho não é apenas ganhar eficiência.\n\nÉ demonstrar profissionalismo.\n\nQuantos retrabalhos sua clínica gera sem perceber?", carrossel:["Retrabalho desgasta.", "A equipe.", "O paciente.", "Os processos.", "Revise as causas.", "Corrija.", "Evite repetir erros.", "Eficiência melhora a experiência."], reels:"\"Retrabalho não cansa apenas a equipe.\n\nCansa o paciente também.\n\nToda vez que alguém precisa repetir uma informação...\n\nExiste um processo que pode melhorar.\"", stories:["Você já teve que repetir informações para uma empresa?\n\n⬜ Sim\n\n⬜ Muitas vezes", "Seus pacientes também passam por isso.", "Observe os retrabalhos."], whatsapp:"Olá!\n\nEstamos revisando seu atendimento para garantir que todas as informações estejam corretas e evitar qualquer retrabalho.\n\nObrigado pela confiança.", prompt:"Crie uma legenda mostrando que reduzir retrabalho melhora a eficiência e a experiência do paciente." },
  O19: { legenda:"Documentação organizada não é burocracia.\n\nÉ segurança.\n\nPara a equipe.\n\nPara o profissional.\n\nE principalmente para o paciente.\n\nQuando informações importantes estão registradas corretamente...\n\nO atendimento fica mais rápido.\n\nMais personalizado.\n\nMais seguro.\n\nOrganizar documentos é organizar experiências.\n\nSua documentação facilita ou dificulta o atendimento?", carrossel:["Documentação também é experiência.", "Organização.", "Segurança.", "Agilidade.", "Menos erros.", "Mais confiança.", "Mais qualidade.", "Revise seus registros."], reels:"\"Uma ficha organizada economiza tempo.\n\nEvita erros.\n\nE melhora a experiência.\n\nDocumentação também faz parte do atendimento.\"", stories:["Sua equipe encontra informações rapidamente?\n\n⬜ Sim\n\n⬜ Nem sempre", "Organização economiza tempo.", "Tempo também é experiência."], whatsapp:"Olá!\n\nSe precisar atualizar algum dado cadastral antes da consulta, basta responder esta mensagem.\n\nAssim conseguimos preparar seu atendimento com antecedência.", prompt:"Crie uma legenda mostrando como uma boa documentação melhora a qualidade do atendimento." },
  O20: { legenda:"Tecnologia não existe para impressionar.\n\nExiste para facilitar.\n\nQuando um sistema demora.\n\nQuando trava.\n\nQuando dificulta o atendimento...\n\nO paciente percebe.\n\nA melhor tecnologia é aquela que quase ninguém percebe.\n\nPorque tudo funciona.\n\nAutomatizar tarefas repetitivas permite que a equipe tenha mais tempo para cuidar de pessoas.\n\nE isso melhora toda a experiência.\n\nA tecnologia da sua clínica aproxima ou afasta os pacientes?", carrossel:["Tecnologia deve facilitar.", "Não complicar.", "Automatize.", "Simplifique.", "Ganhe tempo.", "Cuide de pessoas.", "Tecnologia é ferramenta.", "Experiência continua sendo humana."], reels:"\"Não adianta ter o melhor sistema...\n\nSe ele dificulta a vida do paciente.\n\nTecnologia boa é aquela que libera tempo para o atendimento.\"", stories:["A tecnologia da sua clínica ajuda?\n\n⬜ Muito\n\n⬜ Pouco", "Tecnologia deve facilitar.", "Nunca substituir pessoas."], whatsapp:"Olá!\n\nUtilizamos tecnologia para agilizar seu atendimento, mas nosso compromisso continua sendo oferecer um atendimento humano e próximo.\n\nConte conosco sempre que precisar.", prompt:"Crie uma legenda mostrando como a tecnologia deve ser utilizada para melhorar a experiência do paciente e não apenas automatizar processos." },
  O21: { legenda:"Quando um problema acontece na clínica, a primeira reação costuma ser procurar um culpado.\n\nMas, na maioria das vezes, o problema não está na pessoa.\n\nEstá no processo.\n\nSe um paciente recebe informações diferentes.\n\nSe um exame é esquecido.\n\nSe um retorno não acontece.\n\nTalvez o erro não seja individual.\n\nTalvez o processo permita que isso aconteça.\n\nProcessos bem desenhados reduzem erros.\n\nProtegem a equipe.\n\nE melhoram a experiência do paciente.\n\nPorque excelência não depende da memória das pessoas.\n\nDepende de processos consistentes.\n\nNa sua clínica, os processos ajudam a equipe ou a equipe vive apagando incêndios?", carrossel:["Pessoas erram.", "Processos evitam erros.", "Menos improviso.", "Mais previsibilidade.", "Mais qualidade.", "Mais segurança.", "Mais experiência.", "Revise seus processos."], reels:"\"Quando um erro acontece...\n\nVocê culpa alguém?\n\nOu analisa o processo?\n\nNa maioria das vezes, melhorar o processo evita que o erro aconteça novamente.\"", stories:["Quando algo dá errado...\n\n⬜ Você analisa o processo?\n\n⬜ Ou procura um culpado?", "Processos fortes criam equipes fortes.", "Melhore o sistema."], whatsapp:"Olá!\n\nEstamos revisando continuamente nossos processos para oferecer um atendimento cada vez mais seguro, ágil e organizado.\n\nObrigado por fazer parte dessa evolução.", prompt:"Crie uma legenda mostrando que processos bem estruturados reduzem erros e melhoram a experiência do paciente." },
  O22: { legenda:"Eficiência não significa fazer mais rápido.\n\nSignifica fazer melhor.\n\nSem desperdício.\n\nSem retrabalho.\n\nSem etapas desnecessárias.\n\nQuando uma clínica é eficiente...\n\nA equipe trabalha com mais tranquilidade.\n\nO paciente espera menos.\n\nOs erros diminuem.\n\nA experiência melhora naturalmente.\n\nEficiência não é apenas produtividade.\n\nÉ qualidade com inteligência.\n\nSua clínica trabalha mais ou trabalha melhor?", carrossel:["Eficiência não é correr.", "É eliminar desperdícios.", "É simplificar.", "É organizar.", "É facilitar.", "É melhorar.", "Tudo isso beneficia o paciente.", "Como está sua eficiência?"], reels:"\"Ser eficiente não significa atender correndo.\n\nSignifica eliminar tudo aquilo que não gera valor para o paciente.\n\nEssa é a verdadeira produtividade.\"", stories:["Você perde tempo com tarefas repetitivas?\n\n⬜ Sim\n\n⬜ Muito", "Eficiência é eliminar desperdícios.", "Observe sua rotina."], whatsapp:"Olá!\n\nEstamos constantemente revisando nossos processos para tornar seu atendimento mais ágil, seguro e confortável.\n\nObrigado pela confiança.", prompt:"Crie uma legenda mostrando que eficiência operacional melhora a experiência sem perder a humanização." },
  O23: { legenda:"O paciente não quer ser bem atendido apenas às vezes.\n\nEle quer saber que sempre será bem atendido.\n\nÉ isso que gera confiança.\n\nUma experiência excelente precisa ser repetida.\n\nTodos os dias.\n\nCom qualquer colaborador.\n\nEm qualquer horário.\n\nConsistência transforma qualidade em reputação.\n\nPorque uma única experiência ruim pode apagar várias experiências boas.\n\nSua clínica entrega a mesma qualidade todos os dias?", carrossel:["Uma boa experiência precisa acontecer sempre.", "Não apenas quando tudo dá certo.", "Consistência gera confiança.", "Confiança gera fidelidade.", "Fidelidade gera crescimento.", "Repita boas práticas.", "Padronize.", "Qualidade precisa ser constante."], reels:"\"O paciente não compara apenas uma consulta.\n\nEle compara todas.\n\nConsistência é fazer o básico muito bem, todos os dias.\"", stories:["Sua equipe entrega o mesmo padrão diariamente?\n\n⬜ Sim\n\n⬜ Ainda não", "Consistência gera confiança.", "Repetição cria excelência."], whatsapp:"Olá!\n\nNosso compromisso é oferecer o mesmo padrão de qualidade em todos os atendimentos.\n\nSerá um prazer recebê-lo novamente.", prompt:"Crie uma legenda mostrando que consistência é um dos pilares da experiência do paciente." },
  O24: { legenda:"Experiência do paciente não é responsabilidade apenas da recepção.\n\nNem apenas do médico.\n\nNem apenas da gestão.\n\nÉ responsabilidade de todos.\n\nDesde quem atende o telefone.\n\nAté quem organiza a agenda.\n\nCada pessoa influencia a percepção do paciente.\n\nQuando todos entendem isso...\n\nA experiência deixa de depender de um profissional.\n\nE passa a fazer parte da cultura.\n\nNa sua clínica, todos se sentem responsáveis pela experiência do paciente?", carrossel:["Experiência não pertence a um setor.", "Pertence à clínica inteira.", "Todos influenciam.", "Todos participam.", "Todos comunicam.", "Todos cuidam.", "Responsabilidade compartilhada.", "Experiência é cultura."], reels:"\"Existe um erro muito comum.\n\nAchar que experiência do paciente é responsabilidade da recepção.\n\nNão é.\n\nToda a clínica participa da experiência.\"", stories:["Quem cuida da experiência do paciente?\n\n⬜ Toda equipe\n\n⬜ Apenas recepção", "A resposta certa é...\n\nToda equipe.", "Experiência é responsabilidade coletiva."], whatsapp:"Olá!\n\nToda nossa equipe trabalha em conjunto para que sua experiência seja positiva do início ao fim.\n\nObrigado pela confiança.", prompt:"Crie uma legenda mostrando que a experiência do paciente é responsabilidade de toda a equipe." },
  O25: { legenda:"Nenhuma clínica fica excelente de um dia para o outro.\n\nExcelência é construída.\n\nUma melhoria por vez.\n\nUm processo por vez.\n\nUm treinamento por vez.\n\nUm feedback por vez.\n\nEsperar a mudança perfeita faz muitas clínicas permanecerem iguais.\n\nMelhorar continuamente é muito mais poderoso do que tentar revolucionar tudo de uma vez.\n\nPequenos avanços.\n\nTodos os dias.\n\nÉ isso que diferencia clínicas comuns de clínicas memoráveis.\n\nQual será a próxima melhoria que sua clínica vai implementar esta semana?", carrossel:["Excelência é construída.", "Um processo por vez.", "Uma melhoria por vez.", "Uma equipe mais preparada.", "Um atendimento melhor.", "Uma experiência mais forte.", "Todos evoluem.", "Nunca pare de melhorar."], reels:"\"Você não precisa transformar sua clínica inteira amanhã.\n\nComece por uma melhoria.\n\nDepois outra.\n\nE mais outra.\n\nExcelência é consequência da constância.\"", stories:["Qual foi a última melhoria implementada na sua clínica?", "Pequenas melhorias geram grandes resultados.", "Nunca pare de evoluir."], whatsapp:"Olá!\n\nEstamos constantemente buscando novas formas de melhorar nossos processos e oferecer uma experiência cada vez melhor para você.\n\nObrigado por caminhar conosco nessa evolução.", prompt:"Crie uma legenda mostrando que a excelência operacional é resultado de pequenas melhorias contínuas e consistentes.\n\nPILAR R — RELATIONSHIP AND LOYALTY\n\nPILAR R — RELACIONAMENTO E FIDELIZAÇÃO" },
  R01: { legenda:"Existe um erro que muitas clínicas cometem.\n\nElas acreditam que o relacionamento termina quando o paciente sai da consulta.\n\nNa verdade...\n\nÉ exatamente aí que ele começa.\n\nUm simples contato alguns dias depois pode transmitir uma mensagem muito forte:\n\n\"Nós continuamos nos importando com você.\"\n\nInfelizmente, muitas clínicas lembram do paciente apenas quando precisam confirmar uma nova consulta.\n\nMas quem constrói relacionamento aparece também quando não quer vender nada.\n\nPerguntar como a recuperação está.\n\nSe existe alguma dúvida.\n\nSe o paciente precisa de orientação.\n\nEsses pequenos gestos fortalecem a confiança e aumentam as chances de retorno.\n\nPorque pacientes lembram de quem continua presente mesmo depois do atendimento.\n\nSua clínica desaparece depois da consulta ou continua acompanhando o paciente?", carrossel:["A consulta terminou.\n\nO relacionamento também?", "Para muitas clínicas...\n\nSim.", "Para as melhores...\n\nÉ aí que começa.", "Um simples contato demonstra cuidado.", "Perguntar como o paciente está.", "Esclarecer dúvidas.", "Mostrar presença.", "Pós-consulta também é experiência."], reels:"\"Você quer um paciente que volte?\n\nEntão pare de desaparecer depois da consulta.\n\nUma simples mensagem perguntando como ele está pode fazer muito mais pelo relacionamento do que qualquer campanha de marketing.\n\nRelacionamento continua quando o atendimento termina.\"", stories:["Sua clínica faz acompanhamento depois da consulta?\n\n⬜ Sempre\n\n⬜ Raramente", "Pós-consulta também é cuidado.", "Quem acompanha cria relacionamento."], whatsapp:"Olá!\n\nPassamos para saber como você está após sua consulta.\n\nEsperamos que esteja tudo correndo bem.\n\nSe surgir qualquer dúvida ou precisar de alguma orientação, nossa equipe está à disposição.\n\nSerá um prazer ajudar.", prompt:"Crie uma legenda para Instagram mostrando a importância do pós-consulta para fortalecer o relacionamento e aumentar a fidelização dos pacientes. Utilize linguagem simples, humanizada e termine com uma pergunta que gere interação." },
  R02: { legenda:"Muitas clínicas investem tempo e dinheiro tentando conquistar novos pacientes.\n\nMas esquecem de cuidar daqueles que já confiaram nelas.\n\nConquistar é importante.\n\nFidelizar é essencial.\n\nPorque um paciente satisfeito volta.\n\nIndica.\n\nConfia.\n\nE cria um relacionamento de longo prazo.\n\nFidelização não acontece por acaso.\n\nEla é construída em cada atendimento, em cada conversa e em cada detalhe da experiência.\n\nA pergunta que fica é:\n\nSua clínica trabalha apenas para atrair novos pacientes ou também para manter os atuais?", carrossel:["Conquistar pacientes é importante.", "Mantê-los é ainda mais.", "Fidelização reduz custos.", "Aumenta indicações.", "Fortalece a confiança.", "Cria relacionamento.", "Relacionamentos geram crescimento.", "Sua clínica fideliza?"], reels:"\"Muita gente fala sobre conquistar pacientes.\n\nPouca gente fala sobre mantê-los.\n\nE é justamente aí que muitas clínicas deixam dinheiro na mesa.\n\nRelacionamentos duradouros sempre valem mais.\"", stories:["É mais fácil conquistar ou manter um paciente?", "Fidelizar custa menos.", "Invista em relacionamento."], whatsapp:"Olá!\n\nQueríamos agradecer pela confiança em nossa equipe.\n\nSerá sempre um prazer cuidar de você.\n\nSempre que precisar, estaremos à disposição.", prompt:"Crie uma legenda mostrando que fidelizar pacientes gera mais crescimento do que focar apenas em conquistar novos." },
  R03: { legenda:"Ninguém indica uma clínica porque foi solicitado.\n\nAs pessoas indicam porque viveram uma experiência que vale a pena compartilhar.\n\nQuando um paciente recomenda sua clínica...\n\nEle está emprestando sua reputação para outra pessoa.\n\nIsso é confiança.\n\nPor isso, antes de pensar em pedir indicações...\n\nPense em criar experiências que mereçam ser indicadas.\n\nIndicação é consequência.\n\nNunca estratégia.\n\nSua clínica merece ser indicada?", carrossel:["Pacientes não indicam procedimentos.", "Eles indicam experiências.", "Indicam confiança.", "Indicam acolhimento.", "Indicam segurança.", "Indicam cuidado.", "Tudo isso gera recomendações.", "Sua clínica cria histórias para serem contadas?"], reels:"\"Quer receber mais indicações?\n\nEntão pare de pensar apenas em pedir.\n\nComece a criar experiências que as pessoas sintam vontade de compartilhar.\"", stories:["Você costuma indicar empresas?\n\n⬜ Sim\n\n⬜ Só quando a experiência foi muito boa", "Seus pacientes fazem o mesmo.", "Experiência gera indicação."], whatsapp:"Olá!\n\nFicamos muito felizes por fazer parte da sua jornada.\n\nSe você acredita que nossa clínica pode ajudar outras pessoas, será uma honra sermos lembrados.\n\nObrigado pela confiança.", prompt:"Crie uma legenda mostrando que indicações são consequência de uma experiência memorável." },
  R04: { legenda:"Existe uma pergunta que vale ouro:\n\n\"Como você está?\"\n\nEla parece simples.\n\nMas demonstra interesse.\n\nMuitas clínicas entram em contato apenas para confirmar consultas.\n\nPoucas entram apenas para acompanhar.\n\nFollow-up não é cobrança.\n\nÉ cuidado.\n\nQuando o paciente percebe que a clínica continua presente...\n\nO relacionamento muda completamente.\n\nPorque cuidar também é acompanhar.\n\nSua clínica pergunta como o paciente está ou apenas lembra da próxima consulta?", carrossel:["Uma pergunta pode mudar tudo.", "Como você está?", "Isso demonstra interesse.", "Gera confiança.", "Fortalece o relacionamento.", "Aumenta a fidelização.", "Pequenos gestos importam.", "Faça follow-up."], reels:"\"Existe uma mensagem que todo paciente gosta de receber.\n\nNão é uma cobrança.\n\nÉ alguém perguntando como ele está.\n\nIsso é relacionamento.\"", stories:["Sua clínica faz follow-up?\n\n⬜ Sim\n\n⬜ Não", "Acompanhar também é cuidar.", "Não desapareça depois da consulta."], whatsapp:"Olá!\n\nPassando para saber como você está.\n\nEsperamos que sua recuperação esteja acontecendo conforme esperado.\n\nSe precisar de qualquer orientação, conte conosco.", prompt:"Crie uma legenda mostrando como o follow-up fortalece o relacionamento entre clínica e paciente." },
  R05: { legenda:"Existe um grupo de pacientes que quase toda clínica esquece.\n\nOs pacientes inativos.\n\nEles já confiaram em você.\n\nJá conheceram seu trabalho.\n\nMas, por algum motivo, deixaram de voltar.\n\nSerá que estão insatisfeitos?\n\nMudaram de cidade?\n\nResolveram o problema?\n\nOu simplesmente foram esquecidos?\n\nAntes de investir para conquistar novos pacientes...\n\nOlhe para quem já passou pela sua clínica.\n\nTalvez exista uma grande oportunidade aí.\n\nRelacionamento também significa lembrar de quem ficou pelo caminho.\n\nQuando foi a última vez que sua clínica entrou em contato com um paciente antigo?", carrossel:["Quem sua clínica esqueceu?", "Os pacientes inativos.", "Eles já confiaram em você.", "Já conheceram seu trabalho.", "Talvez só precisem ser lembrados.", "Relacionamento continua.", "Reative contatos.", "Sua base vale ouro."], reels:"\"Antes de gastar dinheiro buscando novos pacientes...\n\nOlhe para quem já passou pela sua clínica.\n\nTalvez o crescimento esteja mais perto do que você imagina.\"", stories:["Sua clínica acompanha pacientes antigos?\n\n⬜ Sim\n\n⬜ Não", "Eles ainda lembram de você?", "Volte a conversar com eles."], whatsapp:"Olá!\n\nFaz algum tempo que não nos falamos.\n\nEsperamos que esteja tudo bem com você.\n\nCaso precise de qualquer orientação ou queira agendar uma nova consulta, será um prazer recebê-lo novamente.", prompt:"Crie uma legenda mostrando a importância de manter relacionamento com pacientes inativos e como isso pode fortalecer a fidelização." },
  R06: { legenda:"Uma consulta pode durar uma hora.\n\nUm relacionamento pode durar anos.\n\nA diferença entre clínicas comuns e clínicas memoráveis está justamente nisso.\n\nElas não enxergam pacientes como atendimentos.\n\nEnxergam pessoas.\n\nPessoas que voltam.\n\nQue indicam.\n\nQue lembram da experiência.\n\nQue passam a confiar.\n\nRelacionamento de longo prazo não nasce de uma única consulta.\n\nNasce da constância.\n\nDa presença.\n\nDo cuidado contínuo.\n\nPorque pacientes permanecem onde se sentem valorizados.\n\nSua clínica constrói consultas ou constrói relacionamentos?", carrossel:["Consultas terminam.\n\nRelacionamentos continuam.", "Confiança leva tempo.", "Presença gera conexão.", "Conexão gera retorno.", "Retorno gera fidelidade.", "Fidelidade gera crescimento.", "Pense no longo prazo.", "Relacionamentos valem mais do que consultas."], reels:"\"Existe uma diferença enorme entre atender um paciente...\n\nE construir um relacionamento com ele.\n\nQuem pensa apenas na consulta perde oportunidades.\n\nQuem pensa no relacionamento ganha pacientes para a vida inteira.\"", stories:["Sua clínica pensa...\n\n⬜ Na próxima consulta\n\n⬜ No próximo relacionamento", "Relacionamentos geram crescimento.", "Pense no longo prazo."], whatsapp:"Olá!\n\nPassando para desejar que esteja tudo bem com você.\n\nNossa equipe continua à disposição sempre que precisar.\n\nSerá um prazer acompanhar sua jornada.", prompt:"Crie uma legenda mostrando a importância de construir relacionamentos de longo prazo com pacientes." },
  R07: { legenda:"Existe uma frase que gosto muito:\n\n\"As pessoas esquecem o que você disse.\n\nMas nunca esquecem como você fez elas se sentirem.\"\n\nNa saúde isso faz ainda mais sentido.\n\nO paciente chega vulnerável.\n\nAnsioso.\n\nCom medo.\n\nE espera encontrar alguém que enxergue mais do que um prontuário.\n\nHumanizar não significa fazer grandes gestos.\n\nSignifica prestar atenção.\n\nOlhar nos olhos.\n\nEscutar sem interromper.\n\nDemonstrar interesse.\n\nÉ isso que cria vínculos verdadeiros.\n\nSua clínica atende pacientes ou acolhe pessoas?", carrossel:["Humanização começa nas pequenas atitudes.", "Olhar.", "Escutar.", "Acolher.", "Respeitar.", "Demonstrar interesse.", "Tudo isso cria vínculos.", "Humanizar é cuidar de pessoas."], reels:"\"Quando falamos em humanização...\n\nMuita gente pensa em grandes ações.\n\nMas a verdade é que ela mora nos detalhes.\n\nNa forma como você escuta.\n\nNa forma como você responde.\n\nNa forma como faz alguém se sentir.\"", stories:["O que faz você se sentir bem atendido?", "Na maioria das vezes...\n\nSão os pequenos gestos.", "Humanizar aproxima."], whatsapp:"Olá!\n\nEsperamos que esteja bem.\n\nSe precisar conversar, esclarecer dúvidas ou receber qualquer orientação, estamos sempre à disposição.", prompt:"Crie uma legenda mostrando que humanização é construída por pequenas atitudes diárias." },
  R08: { legenda:"Nem sempre o paciente lembra tudo o que foi explicado.\n\nMas quase sempre lembra como foi tratado.\n\nÉ isso que chamamos de memória da experiência.\n\nEla não guarda apenas fatos.\n\nGuarda sentimentos.\n\nSegurança.\n\nConfiança.\n\nRespeito.\n\nAcolhimento.\n\nQuando a experiência é positiva...\n\nEla continua viva muito depois da consulta.\n\nE é essa lembrança que faz o paciente voltar.\n\nO que sua clínica deixa na memória das pessoas?", carrossel:["O paciente esquece detalhes.", "Mas lembra sentimentos.", "Lembra da atenção.", "Do respeito.", "Da calma.", "Da confiança.", "Memórias geram retorno.", "Como sua clínica será lembrada?"], reels:"\"Quando você pensa no melhor atendimento que já recebeu...\n\nVocê lembra exatamente das palavras?\n\nOu lembra de como se sentiu?\n\nOs pacientes fazem exatamente a mesma coisa.\"", stories:["O que mais fica na memória?\n\n⬜ Informações\n\n⬜ Sentimentos", "Experiência cria lembranças.", "Construa boas memórias."], whatsapp:"Olá!\n\nEsperamos que sua experiência em nossa clínica tenha sido positiva.\n\nObrigado por confiar em nossa equipe.", prompt:"Crie uma legenda mostrando como experiências positivas permanecem na memória dos pacientes." },
  R09: { legenda:"Existe algo que todo ser humano gosta.\n\nSer reconhecido.\n\nSer chamado pelo nome.\n\nSer lembrado.\n\nSentir que não é apenas mais um.\n\nQuando uma clínica demonstra esse cuidado...\n\nA conexão muda completamente.\n\nReconhecer um paciente é mostrar que ele importa.\n\nE pessoas permanecem onde se sentem importantes.\n\nSua equipe conhece os pacientes pelo nome ou apenas pelo horário da agenda?", carrossel:["Todo mundo gosta de ser reconhecido.", "Chame pelo nome.", "Lembre da história.", "Mostre interesse.", "Demonstre atenção.", "Crie conexão.", "Pequenos gestos.", "Grandes relacionamentos."], reels:"\"Existe um detalhe que muda completamente a experiência.\n\nChamar alguém pelo nome.\n\nParece simples.\n\nMas demonstra que aquela pessoa importa.\"", stories:["Você gosta quando lembram seu nome?\n\n⬜ Sim\n\n⬜ Muito", "Os pacientes também.", "Reconhecer aproxima."], whatsapp:"Olá, [Nome]!\n\nPassando para saber como você está.\n\nEsperamos que esteja tudo bem.\n\nConte sempre conosco.", prompt:"Crie uma legenda mostrando como reconhecer o paciente fortalece o relacionamento." },
  R10: { legenda:"Atender todos da mesma forma parece justo.\n\nMas nem sempre é o melhor caminho.\n\nCada paciente possui uma história.\n\nUma necessidade.\n\nUm medo.\n\nUm objetivo.\n\nPersonalizar não significa criar um atendimento diferente para cada pessoa.\n\nSignifica adaptar a comunicação.\n\nDemonstrar atenção.\n\nMostrar que você percebe quem está do outro lado.\n\nÉ isso que fortalece o relacionamento.\n\nPorque ninguém gosta de se sentir apenas mais um.\n\nO que sua clínica faz para que cada paciente se sinta único?", carrossel:["Todo paciente é único.", "Toda história é diferente.", "Escute.", "Observe.", "Adapte.", "Personalize.", "Relacione-se.", "Experiências personalizadas criam vínculos."], reels:"\"Personalizar não é complicar.\n\nÉ prestar atenção.\n\nÉ lembrar quem está na sua frente.\n\nÉ isso que cria conexão.\"", stories:["Você gosta de atendimento personalizado?\n\n⬜ Sim\n\n⬜ Claro", "Seus pacientes também.", "Personalizar aproxima."], whatsapp:"Olá, [Nome]!\n\nEsperamos que esteja tudo bem.\n\nPensamos em você e gostaríamos de saber como está sua evolução.\n\nSempre que precisar, estaremos por aqui.", prompt:"Crie uma legenda mostrando como personalizar o atendimento fortalece vínculos e aumenta a fidelização dos pacientes." },
  R11: { legenda:"Existem mensagens que o paciente espera.\n\nE existem mensagens que surpreendem.\n\nReceber um \"Feliz Aniversário\" da clínica pode parecer um detalhe.\n\nMas detalhes criam relacionamentos.\n\nÉ uma oportunidade de mostrar que o paciente não é lembrado apenas quando existe uma consulta marcada.\n\nÉ lembrado porque faz parte da história da clínica.\n\nRelacionamento é isso.\n\nEstar presente mesmo quando não existe uma venda acontecendo.\n\nPequenos gestos criam grandes lembranças.\n\nSua clínica lembra das datas importantes dos pacientes?", carrossel:["Relacionamentos são feitos de pequenos gestos.", "Lembrar um aniversário.", "Enviar uma mensagem.", "Demonstrar carinho.", "Mostrar presença.", "Fortalecer vínculos.", "Criar boas lembranças.", "Quem cuida dos detalhes é lembrado."], reels:"\"Você gostaria que uma empresa lembrasse do seu aniversário?\n\nProvavelmente sim.\n\nEntão por que não fazer isso pelos seus pacientes?\n\nRelacionamento continua mesmo fora da consulta.\"", stories:["Você gosta quando lembram do seu aniversário?\n\n⬜ Sim\n\n⬜ Muito", "Os pacientes também.", "Pequenos gestos geram grandes conexões."], whatsapp:"Olá, [Nome]!\n\nHoje é um dia especial.\n\nToda a nossa equipe deseja um feliz aniversário!\n\nQue seu novo ciclo seja repleto de saúde, felicidade e conquistas.\n\nObrigado por confiar em nós.", prompt:"Crie uma legenda mostrando como pequenos gestos, como lembrar o aniversário do paciente, fortalecem o relacionamento." },
  R12: { legenda:"Pacientes podem comprar um atendimento.\n\nMas permanecem quando sentem que fazem parte de algo.\n\nClínicas fortes não criam apenas uma carteira de pacientes.\n\nCriam uma comunidade.\n\nPessoas que acompanham seus conteúdos.\n\nParticipam.\n\nInteragem.\n\nIndicam.\n\nConfiam.\n\nPertencimento gera conexão.\n\nE conexão gera fidelização.\n\nSua clínica possui pacientes ou construiu uma comunidade?", carrossel:["Comunidade vale mais que audiência.", "Pessoas se conectam.", "Compartilham experiências.", "Criam confiança.", "Sentem pertencimento.", "Indicam naturalmente.", "Relacionamentos crescem.", "Construa uma comunidade."], reels:"\"Existe uma diferença enorme entre ter seguidores e ter uma comunidade.\n\nComunidades permanecem.\n\nComentam.\n\nConfiam.\n\nE indicam.\"", stories:["Sua clínica cria relacionamento nas redes sociais?\n\n⬜ Sim\n\n⬜ Pouco", "Relacionamento cria comunidade.", "Comunidade gera crescimento."], whatsapp:"Olá!\n\nÉ muito bom ter você fazendo parte da nossa comunidade de pacientes.\n\nConte sempre com nossa equipe.", prompt:"Crie uma legenda mostrando como construir uma comunidade fortalece a fidelização dos pacientes." },
  R13: { legenda:"Existe uma diferença enorme entre perguntar e realmente ouvir.\n\nMuitas clínicas fazem pesquisas.\n\nPoucas utilizam as respostas para melhorar.\n\nQuando um paciente percebe que sua opinião gerou uma mudança...\n\nEle entende que foi valorizado.\n\nEscutar é uma demonstração de respeito.\n\nE respeito fortalece relacionamentos.\n\nSua clínica apenas coleta opiniões ou realmente aprende com elas?", carrossel:["Escutar é diferente de ouvir.", "Pergunte.", "Preste atenção.", "Aprenda.", "Melhore.", "Agradeça.", "Repita.", "Quem escuta evolui."], reels:"\"Perguntar ao paciente é importante.\n\nMas mostrar que você fez algo com aquele feedback...\n\nÉ ainda mais importante.\"", stories:["Sua clínica utiliza feedback?\n\n⬜ Sim\n\n⬜ Às vezes", "Feedback sem ação perde valor.", "Escute de verdade."], whatsapp:"Olá!\n\nGostaríamos muito de ouvir sua opinião.\n\nExiste algo que poderíamos fazer para tornar sua experiência ainda melhor?", prompt:"Crie uma legenda mostrando como escutar pacientes fortalece o relacionamento." },
  R14: { legenda:"Toda reclamação traz uma escolha.\n\nIgnorar.\n\nOu aprender.\n\nPacientes que reclamam ainda acreditam que vale a pena conversar.\n\nOs que simplesmente desaparecem...\n\nSão muito mais perigosos.\n\nReceber uma reclamação nunca é agradável.\n\nMas responder com respeito, agilidade e interesse pode transformar uma experiência ruim em uma relação ainda mais forte.\n\nReclamações não são ataques.\n\nSão oportunidades de melhoria.\n\nComo sua clínica reage quando um paciente reclama?", carrossel:["Toda reclamação ensina.", "Escute.", "Agradeça.", "Resolva.", "Aprenda.", "Melhore.", "Reconquiste.", "Reclamações também geram confiança."], reels:"\"O pior paciente não é aquele que reclama.\n\nÉ aquele que vai embora sem dizer uma palavra.\n\nValorize quem ainda conversa.\"", stories:["Você encara reclamações como...\n\n⬜ Problema\n\n⬜ Oportunidade", "Quem reclama ainda acredita.", "Escute mais."], whatsapp:"Olá!\n\nLamentamos pela situação.\n\nAgradecemos por compartilhar sua experiência.\n\nEstamos analisando o ocorrido para resolver da melhor forma possível.\n\nObrigado por nos dar a oportunidade de melhorar.", prompt:"Crie uma legenda mostrando como reclamações podem fortalecer o relacionamento quando bem conduzidas." },
  R15: { legenda:"Toda clínica gosta de receber elogios.\n\nMas poucas sabem utilizá-los.\n\nUm elogio mostra aquilo que já está funcionando.\n\nMostra aquilo que deve ser repetido.\n\nCompartilhar elogios com a equipe aumenta motivação.\n\nReforça comportamentos positivos.\n\nE fortalece a cultura.\n\nReconhecer quem faz um bom trabalho também faz parte da experiência do paciente.\n\nSua equipe conhece os elogios que recebe?", carrossel:["Elogios também ensinam.", "Compartilhe.", "Valorize.", "Reconheça.", "Repita.", "Fortaleça a cultura.", "Motive pessoas.", "Celebre boas experiências."], reels:"\"Receber elogios é bom.\n\nMas compartilhar esses elogios com a equipe é ainda melhor.\n\nPorque reconhecimento também motiva.\"", stories:["Sua equipe conhece os elogios dos pacientes?\n\n⬜ Sim\n\n⬜ Não", "Reconhecer fortalece a cultura.", "Compartilhe boas histórias."], whatsapp:"Olá!\n\nMuito obrigado pelas palavras.\n\nReceber seu reconhecimento nos motiva a continuar oferecendo o melhor atendimento possível.\n\nFoi um prazer cuidar de você.", prompt:"Crie uma legenda mostrando como elogios fortalecem a cultura de atendimento e motivam equipes." },
  R16: { legenda:"Sua marca não é aquilo que você publica.\n\nSua marca é aquilo que as pessoas falam sobre você quando você não está presente.\n\nÉ a conversa entre dois amigos.\n\nÉ a indicação espontânea.\n\nÉ o comentário no Google.\n\nÉ a recomendação em um grupo de WhatsApp.\n\nReputação não nasce de propaganda.\n\nEla nasce da soma de centenas de experiências.\n\nPor isso, cuidar da experiência do paciente é cuidar da reputação da clínica.\n\nNo fim, toda clínica tem uma reputação.\n\nA pergunta é:\n\nEla está sendo construída por você ou pelos problemas que ainda não foram resolvidos?", carrossel:["Sua reputação está sendo construída todos os dias.", "Em cada atendimento.", "Em cada mensagem.", "Em cada detalhe.", "Pacientes comentam.", "Pacientes indicam.", "Pacientes lembram.", "Como sua clínica é lembrada?"], reels:"\"A reputação de uma clínica não é construída na propaganda.\n\nEla é construída no atendimento.\n\nCada paciente leva uma história para contar.\n\nQue história ele leva da sua clínica?\"", stories:["Você sabe o que falam da sua clínica?\n\n⬜ Sim\n\n⬜ Não faço ideia", "Reputação nasce da experiência.", "Vale a pena descobrir."], whatsapp:"Olá!\n\nObrigado por confiar na nossa equipe.\n\nEsperamos que sua experiência tenha sido positiva e que possamos continuar fazendo parte da sua jornada de cuidado.", prompt:"Crie uma legenda mostrando que reputação é consequência da experiência vivida pelos pacientes." },
  R17: { legenda:"Você já percebeu quantas decisões toma olhando avaliações?\n\nOs pacientes fazem exatamente a mesma coisa.\n\nAntes de marcar uma consulta...\n\nEles pesquisam.\n\nLeem comentários.\n\nObservam notas.\n\nAs avaliações não servem apenas para atrair novos pacientes.\n\nElas mostram que pessoas reais confiaram na sua clínica.\n\nPor isso, pedir uma avaliação não é inconveniente.\n\nÉ dar voz a quem teve uma boa experiência.\n\nSua clínica transforma pacientes satisfeitos em avaliações positivas?", carrossel:["Antes da consulta...\n\nO paciente pesquisa.", "Lê comentários.", "Observa notas.", "Compara experiências.", "Avaliações geram confiança.", "Confiança gera consultas.", "Peça feedback.", "Sua clínica incentiva avaliações?"], reels:"\"Antes de escolher uma clínica...\n\nVocê olha avaliações?\n\nSe a resposta for sim...\n\nSeus pacientes também.\"", stories:["Você costuma ler avaliações?\n\n⬜ Sempre\n\n⬜ Quase sempre", "Os pacientes também.", "Peça avaliações."], whatsapp:"Olá!\n\nFoi um prazer cuidar de você.\n\nSe nossa equipe contribuiu positivamente para sua experiência, ficaremos muito felizes se puder compartilhar sua opinião em nossa página do Google.\n\nObrigado!", prompt:"Crie uma legenda mostrando a importância das avaliações online para fortalecer a reputação da clínica." },
  R18: { legenda:"Nenhuma clínica é perfeita.\n\nErros acontecem.\n\nA diferença está na forma como eles são resolvidos.\n\nUm problema ignorado afasta pacientes.\n\nUm problema bem resolvido pode fortalecer ainda mais a confiança.\n\nPedir desculpas.\n\nAssumir responsabilidades.\n\nExplicar.\n\nResolver.\n\nEssas atitudes mostram maturidade.\n\nPorque confiança não depende de nunca errar.\n\nDepende da forma como você reage quando erra.\n\nSua clínica sabe recuperar a confiança de um paciente?", carrossel:["Errar acontece.", "Ignorar é escolha.", "Assuma.", "Peça desculpas.", "Resolva.", "Aprenda.", "Reconquiste.", "Confiança pode ser recuperada."], reels:"\"Existe uma habilidade que toda clínica precisa desenvolver.\n\nRecuperar confiança.\n\nPorque não são os erros que definem uma empresa.\n\nÉ a forma como ela responde a eles.\"", stories:["Toda empresa erra?\n\n⬜ Sim\n\n⬜ Claro", "A diferença está na resposta.", "Resolva rápido."], whatsapp:"Olá!\n\nGostaríamos de pedir desculpas pelo ocorrido.\n\nEstamos trabalhando para corrigir a situação e garantir que sua experiência seja positiva.\n\nObrigado por nos dar a oportunidade de melhorar.", prompt:"Crie uma legenda mostrando como recuperar a confiança do paciente fortalece relacionamentos." },
  R19: { legenda:"Se a única mensagem que sua clínica envia é para confirmar consultas...\n\nTalvez ela esteja perdendo oportunidades.\n\nRelacionamento precisa de frequência.\n\nNão para vender.\n\nMas para permanecer presente.\n\nCompartilhar orientações.\n\nDicas.\n\nConteúdo útil.\n\nLembretes importantes.\n\nTudo isso faz com que o paciente continue lembrando da sua clínica.\n\nQuem é lembrado...\n\nÉ escolhido.\n\nCom que frequência sua clínica conversa com os pacientes?", carrossel:["Relacionamento precisa de conversa.", "Não apenas de lembretes.", "Compartilhe conteúdo.", "Ajude.", "Eduque.", "Esteja presente.", "Quem aparece é lembrado.", "Converse mais."], reels:"\"Você fala com seus pacientes apenas quando existe uma consulta?\n\nTalvez esteja na hora de criar um relacionamento de verdade.\"", stories:["Sua clínica conversa com pacientes fora das consultas?\n\n⬜ Sim\n\n⬜ Não", "Relacionamento precisa de frequência.", "Apareça mais."], whatsapp:"Olá!\n\nPassando para compartilhar uma dica importante para cuidar da sua saúde.\n\nNossa equipe preparou um conteúdo que pode ajudar você.\n\nConte sempre conosco.", prompt:"Crie uma legenda mostrando como manter contato frequente fortalece o relacionamento com pacientes." },
  R20: { legenda:"As pessoas esperam um bom atendimento.\n\nMas não esperam ser surpreendidas.\n\nÉ justamente aí que nasce o encantamento.\n\nUm retorno inesperado.\n\nUma mensagem de acompanhamento.\n\nUma lembrança.\n\nUm gesto simples.\n\nSão atitudes que fazem o paciente pensar:\n\n\"Eu não esperava isso.\"\n\nE experiências inesperadamente positivas permanecem na memória.\n\nQuando foi a última vez que sua clínica surpreendeu um paciente?", carrossel:["Encantar é surpreender.", "Não precisa ser caro.", "Precisa ser sincero.", "Pequenos gestos.", "Grandes lembranças.", "Mais relacionamento.", "Mais fidelidade.", "Surpreenda positivamente."], reels:"\"As pessoas esquecem o esperado.\n\nMas lembram do inesperado.\n\nSurpreender positivamente é uma das formas mais rápidas de fortalecer relacionamentos.\"", stories:["Quando foi a última vez que uma empresa te surpreendeu?", "Você ainda lembra disso?", "Faça o mesmo pelos seus pacientes."], whatsapp:"Olá!\n\nPassamos apenas para agradecer pela confiança.\n\nEsperamos que sua experiência tenha sido especial.\n\nConte conosco sempre que precisar.", prompt:"Crie uma legenda mostrando como pequenas surpresas fortalecem a fidelização dos pacientes." },

const DEFAULT_BRAND_PROFILE={empresa:"Sua Empresa",perfil:"@suamarca",corFundo:"#1C1C2E",corDestaque:"#D4AF37",corTexto:"#F5F5F5",logo:""};
const DANIEL_CREDIT="Criado por @DanielPalhano";
function hexLum(hex){
  const h=(hex||"#000000").replace('#','');
  if(h.length<6) return 0;
  const r=parseInt(h.slice(0,2),16)/255,g=parseInt(h.slice(2,4),16)/255,b=parseInt(h.slice(4,6),16)/255;
  return .2126*r+.7152*g+.0722*b;
}
function safeFileName(text){return String(text||'template').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/gi,'-').replace(/(^-|-$)/g,'').toLowerCase();}
function bc(fields){
  const bg=fields.corFundo||DEFAULT_BRAND_PROFILE.corFundo;
  const text=fields.corTexto||DEFAULT_BRAND_PROFILE.corTexto;
  return {
    bg,
    accent:  fields.corDestaque || DEFAULT_BRAND_PROFILE.corDestaque,
    text,
    sub:     text+'99',
    empresa: fields.empresa     || DEFAULT_BRAND_PROFILE.empresa,
    perfil:  fields.perfil      || DEFAULT_BRAND_PROFILE.perfil,
    logo:    fields.logo        || '',
    watermarkColor: hexLum(bg)>.62 ? 'rgba(13,27,42,0.24)' : 'rgba(255,255,255,0.24)'
  };
}
function Watermark({fields={}}){
  const b=bc(fields);
  return <div style={{position:'absolute',bottom:6,right:8,fontSize:7.5,color:b.watermarkColor,letterSpacing:.35,pointerEvents:'none',userSelect:'none',fontWeight:600}}>
    {DANIEL_CREDIT}
  </div>;
}
function BrandLockup({fields,compact=false}){
  const b=bc(fields);
  return <div style={{display:'flex',alignItems:'center',gap:7,minWidth:0}}>
    {b.logo ? <img src={b.logo} style={{width:compact?22:28,height:compact?22:28,borderRadius:6,objectFit:'cover',background:'rgba(255,255,255,0.08)'}}/> : <div style={{width:compact?22:28,height:compact?22:28,borderRadius:6,background:b.accent,color:b.bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:compact?9:11,fontWeight:900}}>{(b.empresa[0]||'M').toUpperCase()}</div>}
    <span style={{color:b.accent,fontSize:compact?8:9,letterSpacing:1.8,fontWeight:800,textTransform:'uppercase',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{b.empresa}</span>
  </div>;
}
function getTemplateSize(template){return {w:template?.exportW||1080,h:template?.exportH||1080,label:`${template?.exportW||1080} × ${template?.exportH||1080}px`};}
function openShare(platform,fields,template){
  const texto=`${fields.titulo||template?.nome||'Conteúdo'}\n\n${fields.cta||''}`.trim();
  const encoded=encodeURIComponent(texto);
  if(platform==='whatsapp') window.open(`https://wa.me/?text=${encoded}`,'_blank');
  if(platform==='instagram') window.open('https://www.instagram.com/','_blank');
  if(platform==='tiktok') window.open('https://www.tiktok.com/upload','_blank');
}

function clamp(n,min,max){return Math.max(min,Math.min(max,n));}
function textColorFromBg(hex){
  try{
    const h=(hex||'#ffffff').replace('#','');
    const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);
    return (r*299+g*587+b*114)>160000?'#0D1B2A':'#F6F2EB';
  }catch(e){return '#F6F2EB';}
}

function VisualCanvas({template,fields,setTplFields,items,setItems,selectedId,setSelectedId,children}){
  const stageRef=useRef(null);
  const dragRef=useRef(null);
  const b=bc(fields);
  const updateItem=(id,patch)=>setItems(arr=>arr.map(it=>it.id===id?{...it,...patch}:it));
  const selected=items.find(it=>it.id===selectedId);

  const startMove=(e,item)=>{
    e.preventDefault(); e.stopPropagation();
    const rect=stageRef.current.getBoundingClientRect();
    const point=e.touches?e.touches[0]:e;
    dragRef.current={mode:'move',id:item.id,startX:point.clientX,startY:point.clientY,origX:item.x,origY:item.y,rect};
    setSelectedId(item.id);
  };
  const startResize=(e,item)=>{
    e.preventDefault(); e.stopPropagation();
    const point=e.touches?e.touches[0]:e;
    const rect=stageRef.current.getBoundingClientRect();
    dragRef.current={mode:'resize',id:item.id,startX:point.clientX,startY:point.clientY,origW:item.w,origH:item.h,rect};
    setSelectedId(item.id);
  };
  useEffect(()=>{
    const onMove=(e)=>{
      if(!dragRef.current) return;
      const point=e.touches?e.touches[0]:e;
      const d=dragRef.current;
      const dx=(point.clientX-d.startX)/d.rect.width*100;
      const dy=(point.clientY-d.startY)/d.rect.height*100;
      if(d.mode==='move') updateItem(d.id,{x:clamp(d.origX+dx,0,96),y:clamp(d.origY+dy,0,96)});
      if(d.mode==='resize') updateItem(d.id,{w:clamp(d.origW+dx,8,100),h:clamp(d.origH+dy,5,100)});
    };
    const onUp=()=>{dragRef.current=null;};
    window.addEventListener('mousemove',onMove); window.addEventListener('mouseup',onUp);
    window.addEventListener('touchmove',onMove,{passive:false}); window.addEventListener('touchend',onUp);
    return ()=>{window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);window.removeEventListener('touchmove',onMove);window.removeEventListener('touchend',onUp);};
  },[]);

  return (
    <div ref={stageRef} onClick={()=>setSelectedId(null)} style={{position:'relative',width:'100%',overflow:'hidden',borderRadius:8,background:'transparent'}}>
      {children}
      {items.map(item=>(
        <div key={item.id} className={'visual-item '+(selectedId===item.id?'selected':'')} onMouseDown={e=>startMove(e,item)} onTouchStart={e=>startMove(e,item)} onClick={e=>{e.stopPropagation();setSelectedId(item.id);}} style={{position:'absolute',left:item.x+'%',top:item.y+'%',width:item.w+'%',height:item.h+'%',cursor:'move',zIndex:20,userSelect:'none'}}>
          {item.type==='image'?(
            <img src={item.src} style={{width:'100%',height:'100%',objectFit:item.fit||'cover',borderRadius:item.radius||0,display:'block',boxShadow:item.shadow?'0 8px 24px rgba(0,0,0,.22)':'none'}}/>
          ):(
            <div contentEditable suppressContentEditableWarning onInput={e=>{
              const text=e.currentTarget.innerText;
              setItems(arr=>arr.map(it=>it.id===item.id?{...it,text}:it));
            }} style={{color:item.color||b.text,fontSize:(item.fontSize||18)+'px',lineHeight:1.2,fontWeight:item.weight||800,textAlign:item.align||'center',whiteSpace:'pre-wrap',padding:'4px 6px',textShadow:item.shadow?'0 2px 12px rgba(0,0,0,.28)':'none'}}>{item.text}</div>
          )}
          {selectedId===item.id&&<div className="visual-resize" onMouseDown={e=>startResize(e,item)} onTouchStart={e=>startResize(e,item)}/>}        
        </div>
      ))}
      {fields.logo&&items.every(i=>i.kind!=='brandLogo')&&(
        <div style={{position:'absolute',left:5,top:5,width:10,height:10,borderRadius:'50%',background:'rgba(255,255,255,.12)',display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden',zIndex:10}}>
          <img src={fields.logo} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
        </div>
      )}
    </div>
  );
}

        <button onClick={addLogo} style={{background:'rgba(255,255,255,0.08)',color:BRAND.creme,border:'1px solid rgba(255,255,255,0.15)',borderRadius:8,padding:'8px',cursor:'pointer',fontSize:12,fontWeight:700}}>+ Logo móvel</button>
      </div>
      <label style={{display:'block',background:'rgba(255,255,255,0.08)',color:BRAND.creme,border:'1px solid rgba(255,255,255,0.15)',borderRadius:8,padding:'8px',cursor:'pointer',fontSize:12,fontWeight:700,textAlign:'center',marginBottom:10}}>

        {movableFields.map(f=><button key={f} onClick={()=>addTextFromField(f)} style={{background:'transparent',color:BRAND.dourado,border:`1px solid ${BRAND.dourado}55`,borderRadius:999,padding:'5px 8px',cursor:'pointer',fontSize:10}}>{f}</button>)}

      {selected?(
        <div style={{borderTop:'1px solid rgba(255,255,255,.1)',paddingTop:10,display:'grid',gridTemplateColumns:isMobile?'1fr':'1fr 1fr',gap:8}}>
          <label style={{fontSize:10,color:BRAND.cinza}}>X<input type="range" min="0" max="95" value={selected.x} onChange={e=>updateSelected({x:+e.target.value})} style={{width:'100%'}}/></label>
          <label style={{fontSize:10,color:BRAND.cinza}}>Y<input type="range" min="0" max="95" value={selected.y} onChange={e=>updateSelected({y:+e.target.value})} style={{width:'100%'}}/></label>
          <label style={{fontSize:10,color:BRAND.cinza}}>Largura<input type="range" min="8" max="100" value={selected.w} onChange={e=>updateSelected({w:+e.target.value})} style={{width:'100%'}}/></label>
          <label style={{fontSize:10,color:BRAND.cinza}}>Altura<input type="range" min="5" max="100" value={selected.h} onChange={e=>updateSelected({h:+e.target.value})} style={{width:'100%'}}/></label>
          {selected.type==='text'&&<>
            <label style={{fontSize:10,color:BRAND.cinza}}>Tamanho da fonte<input type="range" min="8" max="48" value={selected.fontSize||18} onChange={e=>updateSelected({fontSize:+e.target.value})} style={{width:'100%'}}/></label>
            <label style={{fontSize:10,color:BRAND.cinza}}>Cor<input type="color" value={selected.color||b.text} onChange={e=>updateSelected({color:e.target.value})} style={{width:'100%',height:30,background:'none',border:'none'}}/></label>
          </>}
          <button onClick={()=>setItems(arr=>arr.filter(i=>i.id!==selected.id))} style={{gridColumn:isMobile?'auto':'1 / -1',background:'rgba(220,80,80,.12)',color:'#ffb4b4',border:'1px solid rgba(220,80,80,.35)',borderRadius:8,padding:'8px',cursor:'pointer',fontSize:12,fontWeight:700}}>Excluir elemento selecionado</button>
        </div>
      ):(
        <div style={{fontSize:10,color:BRAND.cinza,lineHeight:1.4}}>Toque/clique em qualquer texto, foto ou logo adicionado no slide para arrastar, redimensionar ou ajustar.</div>
      )}
    </div>
  );
}

function TemplateVisual({template,fields}){
  const id=template.id;
  if(id==='T01'||id==='T09') return <SlideCarrossel fields={fields}/>;
  if(id==='T10') return <StoryCard fields={fields} tipo='dica'/>;
  if(id==='T02') return <SlideConceito fields={fields}/>;
  if(id==='T03') return <SlideErro fields={fields}/>;
  if(id==='T04') return <SlideDica fields={fields}/>;
  if(id==='T05') return <SlideChecklist fields={fields}/>;
  if(id==='T06') return <SlideAnteDepois fields={fields}/>;
  if(id==='T07') return <SlideFrase fields={fields}/>;
  if(id==='T08') return <SlidePergunta fields={fields}/>;
  if(id==='T11') return <RoteiroCenas fields={fields}/>;
  if(id==='T12') return <StoryCard fields={fields} tipo='enquete'/>;
  if(id==='T13') return <StoryCard fields={fields} tipo='dica'/>;
  if(id==='T14') return <StoryCard fields={fields} tipo='caixa'/>;
  if(id==='T15') return <SlideCTA fields={fields}/>;
  if(id==='T16') return <WhatsAppCard fields={fields}/>;
  if(id==='T17') return <EmailCard fields={fields}/>;
  if(id==='T18') return <InfograficoCard fields={fields}/>;
  if(id==='T19') return <CaseCard fields={fields}/>;
  if(id==='T20') return <MetodoCORECard fields={fields}/>;
  return <SlideCarrossel fields={fields}/>;
}

// ─── MAIN APP ──────────────────────────────────────────────────────────────────
function BibliotecaCORE(){
  const isMobile=useIsMobile();
  const [authed,setAuthed] = useState(false);
  const [code,setCode] = useState("");
  const [codeErr,setCodeErr] = useState(false);
  const [page,setPage] = useState("dashboard");
  const [searchQ,setSearchQ] = useState("");
  const [filterPilar,setFilterPilar] = useState("todos");
  const [filterCat,setFilterCat] = useState("todos");
  const [filterObj,setFilterObj] = useState("todos");
  const [favorites,setFavorites] = useState({});
  const [history,setHistory] = useState([]);
  const [openItem,setOpenItem] = useState(null);
  const [openContent,setOpenContent] = useState(null);
  const [openTemplate,setOpenTemplate] = useState(null);
  const [tplFields,setTplFields] = useState({});
  const [visualItems,setVisualItems] = useState([]);
  const [selectedVisualItem,setSelectedVisualItem] = useState(null);
  const [brandProfile,setBrandProfile] = useState(()=>{try{return {...DEFAULT_BRAND_PROFILE,...JSON.parse(localStorage.getItem("coreBrandProfile")||"{}")} }catch(e){return DEFAULT_BRAND_PROFILE;}});
  const [activeTab,setActiveTab] = useState("legenda");
  const [copyMsg,setCopyMsg] = useState("");
  const previewRef = useRef(null);

  useEffect(()=>{localStorage.setItem("coreBrandProfile",JSON.stringify(brandProfile));},[brandProfile]);

  const toggleFav=(id)=>setFavorites(f=>({...f,[id]:!f[id]}));
  const addHistory=(id)=>setHistory(h=>[id,...h.filter(x=>x!==id)].slice(0,20));

  const handleLogin=()=>{
    if(code.trim().toUpperCase()===ACCESS_CODE){setAuthed(true);}
    else{setCodeErr(true);setTimeout(()=>setCodeErr(false),2000);}
  };

  const filteredStrategic=useMemo(()=>STRATEGIC.filter(item=>{
    const matchPilar=filterPilar==="todos"||item.pilar===filterPilar;
    const matchSearch=!searchQ||item.tema.toLowerCase().includes(searchQ.toLowerCase())||item.frase.toLowerCase().includes(searchQ.toLowerCase())||item.pergunta.toLowerCase().includes(searchQ.toLowerCase());
    return matchPilar&&matchSearch;
  }),[filterPilar,searchQ]);

  const filteredContent=useMemo(()=>STRATEGIC.filter(item=>{
    const matchPilar=filterPilar==="todos"||item.pilar===filterPilar;
    const matchSearch=!searchQ||item.tema.toLowerCase().includes(searchQ.toLowerCase());
    return matchPilar&&matchSearch;
  }),[filterPilar,searchQ]);

  const filteredTemplates=useMemo(()=>TEMPLATES.filter(t=>{
    const matchCat=filterCat==="todos"||t.categoria===filterCat;
    const matchObj=filterObj==="todos"||t.objetivo===filterObj;
    const matchSearch=!searchQ||t.nome.toLowerCase().includes(searchQ.toLowerCase())||t.descricao.toLowerCase().includes(searchQ.toLowerCase());
    return matchCat&&matchObj&&matchSearch;
  }),[filterCat,filterObj,searchQ]);

  const favCount=Object.values(favorites).filter(Boolean).length;
  const viewedCount=history.length;
  const totalItems=STRATEGIC.length+TEMPLATES.length;
  const progress=Math.round((viewedCount/totalItems)*100);

  const copy=(text,label)=>{
    navigator.clipboard.writeText(text).then(()=>{
      setCopyMsg(`${label} copiado!`);
      setTimeout(()=>setCopyMsg(""),2500);
    });
  };

  const downloadPNG=async()=>{
    if(!previewRef.current) return;
    try{
      const raw=await html2canvas(previewRef.current,{backgroundColor:null,scale:3,useCORS:true});
      const {w,h}=getTemplateSize(openTemplate);
      const out=document.createElement('canvas');
      out.width=w; out.height=h;
      const ctx=out.getContext('2d');
      ctx.drawImage(raw,0,0,w,h);
      const link=document.createElement('a');
      link.download=`${safeFileName(openTemplate?.nome||'template')}-${w}x${h}.png`;
      link.href=out.toDataURL('image/png');
      link.click();
    }catch(e){alert("Erro ao exportar. Tente novamente.");}
  };

  const updateBrand=(patch)=>setBrandProfile(b=>({...b,...patch}));
  const applyBrandToFields=(extra={})=>({...brandProfile,...extra});
  const openTpl=(t,seed={})=>{
    setOpenTemplate(t);
    const init=applyBrandToFields(seed);
    t.campos.forEach(c=>{if(init[c]===undefined) init[c]="";});
    setTplFields(init);
    setVisualItems([]);
    setSelectedVisualItem(null);
  };

  if(!authed) return <Login code={code} setCode={setCode} err={codeErr} onLogin={handleLogin}/>;

  return (
    <div style={{minHeight:"100vh",background:BRAND.azul,color:BRAND.creme,fontFamily:"'Inter','Segoe UI',sans-serif",display:"flex",flexDirection:"column"}}>
      <header style={{background:BRAND.azulAcin,borderBottom:`1px solid rgba(200,166,106,0.25)`,padding:isMobile?"10px 12px":"0 24px",minHeight:isMobile?86:56,height:isMobile?"auto":56,display:"flex",flexDirection:isMobile?"column":"row",alignItems:isMobile?"stretch":"center",justifyContent:"space-between",gap:isMobile?8:0,flexShrink:0,position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:12,justifyContent:isMobile?"center":"flex-start"}}>
          <OrbIcon size={isMobile?24:28}/>
          <span style={{fontWeight:700,fontSize:15,letterSpacing:1.5,color:BRAND.creme}}>BIBLIOTECA CORE</span>
        </div>
        <nav className="mobile-nav" style={{display:"flex",gap:4,justifyContent:isMobile?"flex-start":"flex-end"}}>
          {[["dashboard","Dashboard"],["estrategica","Banco de Ideias"],["conteudo","Conteúdo Social"],["templates","Templates"]].map(([k,l])=>(
