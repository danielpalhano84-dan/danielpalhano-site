const {useState,useMemo,useRef,useEffect} = React;

function useIsMobile(){
  const get=()=>typeof window!=='undefined' && window.innerWidth<=760;
  const [isMobile,setIsMobile]=useState(get());
  useEffect(()=>{
    const onResize=()=>setIsMobile(get());
    window.addEventListener('resize',onResize);
    window.addEventListener('orientationchange',onResize);
    return ()=>{window.removeEventListener('resize',onResize);window.removeEventListener('orientationchange',onResize);};
  },[]);
  return isMobile;
}

const BRAND={azul:"#0D1B2A",azulAcin:"#1E293B",creme:"#F6F2EB",dourado:"#C8A66A",cinza:"#D9D6D1",musgo:"#4F5D3A"};

const STRATEGIC = [
  // PILAR C
  { id:"C01", pilar:"C", tema:"Primeira impressão", pergunta:"Sua clínica causa confiança nos primeiros segundos ou só depois da consulta?", analogia:"Primeira impressão é como a entrada de um restaurante: antes de provar a comida, a pessoa já sente se quer ficar.", historia:"Um paciente pode chegar na clínica antes mesmo da consulta: pelo Instagram, pelo WhatsApp, pelo Google ou pela recepção. Cada ponto já cria uma percepção.", frase:"A experiência do paciente começa antes do atendimento.", gancho:"Você acha que a experiência começa dentro do consultório?", cta:"Olhe para sua clínica como se fosse a primeira vez. O que você sentiria?", prompt:"Crie um post para clínicas mostrando que a primeira impressão começa antes da consulta, com tom humano e exemplo prático." },
  { id:"C02", pilar:"C", tema:"Confiança", pergunta:"O que faz um paciente confiar em você antes mesmo de começar o tratamento?", analogia:"Confiança é como uma ponte: demora para construir, mas um detalhe mal cuidado pode abalar tudo.", historia:"Às vezes o paciente não sabe avaliar a técnica, mas sabe sentir se foi ouvido, respeitado e bem orientado.", frase:"Paciente não volta só pelo tratamento. Volta pela confiança.", gancho:"O paciente pode não entender sua técnica, mas entende como você faz ele se sentir.", cta:"Sua clínica constrói confiança ou apenas entrega atendimento?", prompt:"Crie uma legenda sobre confiança na jornada do paciente, usando linguagem simples e emocional." },
  { id:"C03", pilar:"C", tema:"Valor percebido", pergunta:"Seu paciente entende o valor do que você entrega ou só enxerga preço?", analogia:"Valor percebido é como embalagem de presente: antes de abrir, a pessoa já cria uma expectativa.", historia:"Muitas clínicas oferecem um excelente serviço, mas comunicam de forma tão fria que o paciente só consegue comparar preço.", frase:"Quando o valor não é percebido, o preço vira o centro da conversa.", gancho:"O problema nem sempre é o preço. Às vezes é a forma como o valor foi apresentado.", cta:"Como sua clínica mostra valor antes de falar em orçamento?", prompt:"Crie um post explicando como clínicas podem aumentar valor percebido sem parecerem comerciais." },
  { id:"C04", pilar:"C", tema:"Emoções", pergunta:"Que emoção o paciente sente quando fala com sua clínica?", analogia:"Atendimento é como música ambiente: mesmo quando ninguém presta atenção, ele muda o clima.", historia:"Um paciente ansioso não quer apenas uma resposta. Ele quer sentir que está em boas mãos.", frase:"Pacientes esquecem detalhes, mas lembram da emoção que sentiram.", gancho:"Toda clínica gera emoção. A questão é: qual?", cta:"Que sensação sua clínica transmite hoje?", prompt:"Crie uma legenda sobre o papel das emoções na experiência do paciente em clínicas." },
  { id:"C05", pilar:"C", tema:"Medos", pergunta:"Sua clínica acolhe os medos do paciente ou tenta apenas vender o procedimento?", analogia:"Medo é como uma mala invisível: o paciente entra carregando, mesmo sem falar nada.", historia:"Muitos pacientes não somem por desinteresse. Somem porque ficaram inseguros, com medo ou confusos.", frase:"Antes de decidir, o paciente precisa se sentir seguro.", gancho:"Nem todo paciente que não fecha está sem dinheiro. Às vezes ele está com medo.", cta:"Sua comunicação reduz medo ou aumenta dúvida?", prompt:"Crie um post sobre como clínicas podem acolher os medos do paciente antes da decisão." },
  { id:"C06", pilar:"C", tema:"Ansiedade", pergunta:"Sua clínica diminui ou aumenta a ansiedade do paciente?", analogia:"A ansiedade do paciente é como uma sala de espera cheia: se ninguém organiza, vira caos.", historia:"Uma mensagem sem resposta, um atraso sem explicação ou uma informação mal dada pode aumentar muito a ansiedade de quem já está vulnerável.", frase:"Clareza também é cuidado.", gancho:"Às vezes, o que o paciente precisa não é de mais informação. É de mais tranquilidade.", cta:"Sua clínica comunica com clareza nos momentos de ansiedade?", prompt:"Crie uma legenda sobre ansiedade do paciente e a importância da comunicação clara." },
  { id:"C07", pilar:"C", tema:"Expectativas", pergunta:"Sua clínica alinha expectativas ou deixa o paciente imaginar sozinho?", analogia:"Expectativa é como combinado de viagem: se cada um entende uma coisa, alguém vai se frustrar.", historia:"Grande parte das reclamações nasce quando o paciente esperava uma coisa e recebeu outra.", frase:"Experiência ruim muitas vezes é expectativa mal alinhada.", gancho:"O paciente frustrado nem sempre recebeu pouco. Às vezes esperava diferente.", cta:"Sua clínica promete, explica e alinha com clareza?", prompt:"Crie um post sobre alinhamento de expectativas no atendimento de clínicas." },
  { id:"C08", pilar:"C", tema:"Perfil do paciente", pergunta:"Você trata todos os pacientes do mesmo jeito?", analogia:"Atender pacientes é como ajustar a luz de uma sala: cada ambiente pede uma intensidade diferente.", historia:"Tem paciente que quer detalhes. Tem paciente que quer objetividade. Tem paciente que precisa de acolhimento. Entender isso muda tudo.", frase:"Atendimento personalizado começa quando a clínica para de tratar todo mundo igual.", gancho:"Nem todo paciente quer a mesma conversa.", cta:"Sua equipe sabe identificar diferentes perfis de pacientes?", prompt:"Crie uma legenda sobre personalização no atendimento de clínicas." },
  { id:"C09", pilar:"C", tema:"Jornada do paciente", pergunta:"Você sabe por onde o paciente passa antes, durante e depois da consulta?", analogia:"A jornada do paciente é como um mapa: sem ele, a clínica anda no escuro.", historia:"O paciente não vive apenas a consulta. Ele vive o agendamento, a espera, o atendimento, o pagamento, o retorno e o pós-consulta.", frase:"A consulta é só uma parte da experiência.", gancho:"Sua clínica olha para a jornada inteira ou só para o atendimento final?", cta:"Mapeie todos os pontos de contato do paciente com sua clínica.", prompt:"Crie um post explicando a jornada do paciente de forma simples para donos de clínicas." },

  { id:"C14", pilar:"C", tema:"Satisfação", pergunta:"Você sabe se o paciente está satisfeito ou apenas presume?", analogia:"Satisfação é como temperatura: não dá para adivinhar, precisa medir.", historia:"Muitos pacientes insatisfeitos não reclamam. Apenas não voltam.", frase:"Silêncio do paciente não significa satisfação.", gancho:"O paciente que não reclama pode ser o mesmo que não volta.", cta:"Sua clínica pergunta como foi a experiência?", prompt:"Crie uma legenda sobre a importância de medir satisfação em clínicas." },

  { id:"C16", pilar:"C", tema:"Indicação", pergunta:"Sua clínica é boa o suficiente para ser indicada?", analogia:"Indicação é como passar um contato importante: ninguém indica o que não confia.", historia:"O paciente só indica quando sente segurança em colocar o nome dele junto com o da sua clínica.", frase:"Indicação é confiança transferida.", gancho:"Antes de pedir indicação, pergunte: sua experiência merece ser indicada?", cta:"Sua clínica cria momentos que dão vontade de indicar?", prompt:"Crie uma legenda sobre indicação como consequência de uma boa experiência." },

  { id:"E20", pilar:"E", tema:"Visão de longo prazo", pergunta:"Sua clínica toma decisões pensando no próximo mês ou nos próximos anos?", analogia:"Construir experiência é plantar uma árvore.", historia:"Resultados consistentes aparecem para quem pensa no longo prazo.", frase:"Quem planta relacionamento colhe crescimento.", gancho:"Sua estratégia olha para onde?", cta:"Pense além da próxima agenda.", prompt:"Crie uma legenda sobre visão de longo prazo." },
