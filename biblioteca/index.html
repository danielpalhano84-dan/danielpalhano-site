          ))}
        </nav>
      </header>

      <main style={{flex:1,overflowY:"auto",overflowX:"hidden"}}>
        {page==="dashboard" && <Dashboard favCount={favCount} viewedCount={viewedCount} progress={progress} setPage={setPage}/>}
        {page==="estrategica" && (
          <LibraryPage title="Banco de Ideias" subtitle="100 temas com história, analogia, gancho, frase e prompt. Use cada ideia para criar conteúdo ou preencher um template." filterPilar={filterPilar} setFilterPilar={setFilterPilar} searchQ={searchQ} setSearchQ={setSearchQ}>
            <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"repeat(auto-fill,minmax(300px,1fr))",gap:16}}>
              {filteredStrategic.map(item=>(
                <StrategicCard key={item.id} item={item} fav={favorites[item.id]} onFav={()=>toggleFav(item.id)} onOpen={()=>{setOpenItem(item);addHistory(item.id);}}/>
              ))}
            </div>
            {filteredStrategic.length===0&&<Empty/>}
          </LibraryPage>
        )}
        {page==="conteudo" && (
          <LibraryPage title="Conteúdo Social" subtitle="Legendas, carrosseis, Reels, Stories, WhatsApp e Prompts prontos. Copie ou envie direto para um template visual." filterPilar={filterPilar} setFilterPilar={setFilterPilar} searchQ={searchQ} setSearchQ={setSearchQ}>
            <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"repeat(auto-fill,minmax(300px,1fr))",gap:16}}>
              {filteredContent.map(item=>(
                <ContentCard key={item.id} item={item} hasContent={!!CONTENT[item.id]} fav={favorites["ct_"+item.id]} onFav={()=>toggleFav("ct_"+item.id)} onOpen={()=>{if(CONTENT[item.id]){setOpenContent(item);setDetailedPrompt("");setActiveTab("legenda");addHistory("ct_"+item.id);}}}/>
              ))}
            </div>
            {filteredContent.length===0&&<Empty/>}
          </LibraryPage>
        )}
        {page==="templates" && (
          <LibraryPage title="Biblioteca de Templates" subtitle="Preencha os campos, visualize o design ao vivo e baixe em PNG." filterPilar={null} filterCat={filterCat} setFilterCat={setFilterCat} filterObj={filterObj} setFilterObj={setFilterObj} searchQ={searchQ} setSearchQ={setSearchQ}>
            <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"repeat(auto-fill,minmax(240px,1fr))",gap:16}}>
              {filteredTemplates.map(t=>(
                <TemplateCard key={t.id} t={t} fav={favorites["tpl_"+t.id]} onFav={()=>toggleFav("tpl_"+t.id)} onOpen={()=>openTpl(t)}/>

            {filteredTemplates.length===0&&<Empty/>}

        )}
      </main>

      {/* MODAL: Strategic */}
      {openItem&&(
        <Modal onClose={()=>setOpenItem(null)}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
            <PillarBadge pilar={openItem.pilar}/>
            <h2 style={{margin:0,fontSize:20,color:BRAND.creme}}>{openItem.tema}</h2>
          </div>
          {[["💬 Pergunta","pergunta"],["🎭 Analogia","analogia"],["📖 História","historia"],["✨ Frase","frase"],["🎯 Gancho","gancho"],["📣 CTA","cta"],["🤖 Prompt","prompt"]].map(([label,key])=>(
            <div key={key} style={{marginBottom:16}}>
              <div style={{fontSize:11,fontWeight:700,color:BRAND.dourado,letterSpacing:1,marginBottom:6}}>{label}</div>
              <div onClick={()=>copy(openItem[key],label)} style={{background:"rgba(255,255,255,0.05)",borderRadius:8,padding:"12px 14px",fontSize:14,lineHeight:1.6,color:BRAND.creme,cursor:"pointer",border:"1px solid rgba(255,255,255,0.08)",position:"relative"}}>
                {openItem[key]}
                <span style={{position:"absolute",bottom:6,right:10,fontSize:9,color:BRAND.cinza,opacity:.7}}>clique p/ copiar</span>
              </div>
            </div>
          ))}
          <div style={{display:"flex",gap:8,marginTop:20,paddingTop:16,borderTop:"1px solid rgba(255,255,255,0.08)"}}>

                "🎭 ANALOGIA\n"+openItem.analogia,

            </button>
          </div>
          {copyMsg&&<Toast msg={copyMsg}/>}
        </Modal>

            {[["legenda","📝 Legenda"],["carrossel","🎠 Carrossel"],["reels","🎬 Reels"],["stories","📱 Stories"],["whatsapp","💬 WhatsApp"],["prompt","🤖 Prompt"]].map(([k,l])=>(

          </div>

          {activeTab==="prompt" ? (

                {activeTab==="carrossel"&&CONTENT[openContent.id].carrossel.map((s,i)=>(
                  <div key={i} style={{marginBottom:12,paddingBottom:12,borderBottom:i<CONTENT[openContent.id].carrossel.length-1?"1px solid rgba(255,255,255,0.07)":"none"}}>

  return (
    <div className="mobile-modal" onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:1000,display:"flex",alignItems:isMobile?"flex-start":"center",justifyContent:"center",padding:isMobile?8:20,overflowY:"auto"}}>
      <div className="mobile-modal-panel" onClick={e=>e.stopPropagation()} style={{background:BRAND.azulAcin,borderRadius:isMobile?12:16,padding:isMobile?"18px 14px":28,width:"100%",maxWidth:isMobile?"100%":extraWide?960:wide?760:520,maxHeight:isMobile?"96vh":"90vh",overflowY:"auto",border:`1px solid rgba(200,166,106,0.3)`,position:"relative",margin:isMobile?"0 auto":"auto"}}>
        <button onClick={onClose} style={{position:"absolute",top:14,right:14,background:"rgba(255,255,255,0.08)",border:"none",borderRadius:6,color:BRAND.cinza,fontSize:18,cursor:"pointer",width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
        {children}
      </div>
    </div>
  );
}

function PillarBadge({pilar}){
  return <span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:24,height:24,borderRadius:"50%",background:PILLAR_COLORS[pilar],color:"#fff",fontSize:11,fontWeight:900,flexShrink:0}}>{pilar}</span>;
}

function BigCard({icon,title,desc,count,onClick,color}){
  return (
    <div onClick={onClick} style={{background:BRAND.azulAcin,borderRadius:12,padding:22,cursor:"pointer",border:`1px solid ${color}30`,transition:"all .15s"}}
      onMouseEnter={e=>{e.currentTarget.style.borderColor=color;e.currentTarget.style.transform="translateY(-2px)";}}
      onMouseLeave={e=>{e.currentTarget.style.borderColor=`${color}30`;e.currentTarget.style.transform="none";}}>
      <div style={{fontSize:28,marginBottom:10}}>{icon}</div>
      <h3 style={{margin:"0 0 6px",fontSize:15,color:BRAND.creme}}>{title}</h3>
      <p style={{margin:"0 0 12px",fontSize:12,color:BRAND.cinza,lineHeight:1.5}}>{desc}</p>
      <span style={{fontSize:11,color,fontWeight:700,background:`${color}15`,padding:"3px 10px",borderRadius:10}}>{count}</span>
    </div>
  );
}

function Stat({label,value}){
  return (
    <div>
      <div style={{fontSize:20,fontWeight:800,color:BRAND.dourado}}>{value}</div>
      <div style={{fontSize:11,color:BRAND.cinza}}>{label}</div>
    </div>
  );
}

function Toast({msg}){
  return <div style={{position:"fixed",bottom:24,right:24,background:BRAND.dourado,color:BRAND.azul,padding:"8px 16px",borderRadius:8,fontWeight:700,fontSize:13,zIndex:2000,boxShadow:"0 4px 20px rgba(0,0,0,0.4)"}}>{msg}</div>;
}

function Empty(){
  return <div style={{textAlign:"center",padding:48,color:BRAND.cinza,fontSize:14}}>Nenhum item encontrado. Tente outro filtro ou termo de busca.</div>;
}

function OrbIcon({size=36}){
  return (
    <svg width={size} height={size} viewBox="0 0 36 36" fill="none">
      <circle cx="18" cy="18" r="16" stroke={BRAND.dourado} strokeWidth="1.5" strokeDasharray="3 2"/>
      <circle cx="18" cy="18" r="9" fill={BRAND.azulAcin} stroke={BRAND.dourado} strokeWidth="1.5"/>
      <circle cx="18" cy="18" r="3" fill={BRAND.dourado}/>
    </svg>
  );
}

const rootEl=document.getElementById('root');
const root=ReactDOM.createRoot(rootEl);
root.render(React.createElement(BibliotecaCORE));
</script>
</body>
</html>
