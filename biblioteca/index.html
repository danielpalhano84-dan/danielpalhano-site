const CONTENT = {
  C01: { legenda:"A primeira impressão da sua clínica não começa quando o paciente entra no consultório.\n\nEla começa muito antes.\n\nComeça quando ele encontra sua clínica no Google.\nQuando entra no seu Instagram.\nQuando envia uma mensagem no WhatsApp.\nQuando liga para agendar uma consulta.\n\nCada um desses momentos cria uma expectativa.\n\nE sabe o que é interessante?\n\nMesmo antes de conhecer o profissional, o paciente já está formando uma opinião sobre a clínica.\n\nÀs vezes, um atendimento rápido, uma mensagem bem escrita ou uma recepção acolhedora valem mais do que qualquer equipamento moderno.\n\nPorque experiência não começa na consulta.\n\nEla começa no primeiro contato.\n\nE a pergunta que fica é:\n\nSe você fosse paciente da sua própria clínica, qual seria sua primeira impressão?", carrossel:["A primeira impressão da sua clínica acontece antes da consulta.", "Ela começa quando o paciente encontra sua clínica na internet.", "Continua no primeiro atendimento pelo WhatsApp.", "Passa pela ligação telefônica.", "Chega na recepção.", "E só depois disso acontece a consulta.", "Percebe?\n\nO paciente já criou uma expectativa muito antes de conhecer o profissional.", "Experiência do paciente começa no primeiro contato.\nComo está a primeira impressão da sua clínica?"], reels:"\"Você acha que a experiência do paciente começa dentro do consultório?\n\nNa verdade, ela começa muito antes.\n\nEla começa quando alguém procura sua clínica no Google.\n\nQuando entra no Instagram.\n\nQuando manda uma mensagem no WhatsApp.\n\nQuando liga para agendar um horário.\n\nCada detalhe vai construindo uma percepção.\n\nE quando o paciente finalmente entra na clínica, ele já criou expectativas sobre você.\n\nPor isso, cuidar da experiência não é apenas atender bem.\n\nÉ cuidar de todos os pontos de contato.\n\nPorque a primeira impressão pode definir todo o relacionamento.\"", stories:["📊 Enquete\n\nNa sua opinião...\n\nA experiência do paciente começa:\n\n⬜ Na consulta\n\n⬜ Antes da consulta", "A resposta é:\n\nAntes da consulta.\n\nInstagram.\nGoogle.\nWhatsApp.\nTelefone.\nRecepção.\n\nTudo isso já comunica.", "A pergunta é:\n\n👉 Se você fosse paciente da sua própria clínica...\n\nQual seria sua primeira impressão?"], whatsapp:"Olá! 😊\n\nEsperamos que você esteja bem.\n\nQueremos aproveitar para agradecer pela confiança em nossa clínica.\n\nDesde o primeiro contato, nosso objetivo é fazer com que você se sinta acolhido, bem informado e seguro durante toda a sua experiência conosco.\n\nSe tiver qualquer dúvida, estamos à disposição. Será um prazer ajudar.", prompt:"Você é um especialista em Experiência do Cliente para clínicas. Crie uma legenda para Instagram sobre primeira impressão, utilizando linguagem simples, humanizada e consultiva. O texto deve mostrar que a experiência do paciente começa antes da consulta, utilizando exemplos como Google, Instagram, WhatsApp e recepção. Finalize com uma pergunta para gerar comentários." },
  C02: { legenda:"Confiança não se pede. Se constrói.\n\nÉ curioso como muitos pacientes chegam até uma clínica sem entender nada sobre técnica, equipamentos ou procedimentos.\n\nMas eles entendem uma coisa muito bem.\n\nComo você faz eles se sentirem.\n\nA confiança começa quando alguém responde uma mensagem com atenção.\n\nQuando explica sem pressa.\n\nQuando olha nos olhos.\n\nQuando cumpre o que prometeu.\n\nQuando demonstra interesse genuíno.\n\nNo final, o paciente pode até esquecer parte da consulta.\n\nMas dificilmente esquece como foi tratado.\n\nE é justamente isso que faz ele voltar.\n\nA confiança não nasce em um grande momento.\n\nEla é construída em pequenos detalhes, todos os dias.\n\nAgora me conta: o que sua clínica faz hoje para aumentar a confiança dos pacientes?", carrossel:["O paciente não entende tudo sobre saúde...\n\nMas entende quando pode confiar.", "A confiança começa antes da consulta.", "Ela aparece quando alguém responde com atenção.", "Quando a equipe transmite segurança.", "Quando a comunicação é clara.", "Quando o paciente percebe organização.", "A confiança é construída em pequenos detalhes.", "Sua clínica está construindo ou desgastando a confiança dos pacientes?"], reels:"\"Existe uma coisa que todo paciente procura antes mesmo de pensar no tratamento.\n\nConfiança.\n\nE sabe o mais interessante?\n\nEla não nasce quando você começa o procedimento.\n\nEla começa muito antes.\n\nNa primeira mensagem.\n\nNa forma como sua equipe atende.\n\nNa organização da clínica.\n\nNa clareza das informações.\n\nNo cuidado com cada detalhe.\n\nPorque ninguém volta apenas pelo tratamento.\n\nAs pessoas voltam para lugares onde se sentem seguras.\n\nPensa nisso.\"", stories:["Você acha que confiança se conquista em uma consulta?\n\n⬜ Sim\n\n⬜ Não", "A confiança começa muito antes.\n\nComeça na primeira conversa.", "Pergunta:\n\n👉 O que faz você confiar em uma empresa?"], whatsapp:"Olá!\n\nPassando para saber como você está.\n\nEsperamos que esteja se recuperando bem e queremos lembrar que nossa equipe continua à disposição caso surja qualquer dúvida.\n\nPara nós, cuidar da sua experiência também faz parte do tratamento.\n\nConte sempre conosco.", prompt:"Crie uma legenda para Instagram sobre confiança na experiência do paciente. Escreva em tom de conversa, utilizando exemplos do dia a dia e mostrando que confiança é construída em pequenos detalhes. Finalize com uma pergunta que incentive comentários. O público são gestores de clínicas." },
  C03: { legenda:"Você já percebeu que duas clínicas podem oferecer praticamente o mesmo serviço... e ainda assim uma ser vista como muito mais valiosa?\n\nIsso acontece porque o paciente não enxerga apenas o procedimento.\n\nEle enxerga tudo o que envolve a experiência.\n\nA facilidade para agendar.\n\nA atenção no atendimento.\n\nA organização.\n\nA comunicação.\n\nO ambiente.\n\nO cuidado.\n\nTudo isso aumenta a percepção de valor.\n\nQuando a experiência é boa, o paciente entende melhor o investimento que está fazendo.\n\nQuando ela é ruim, a conversa acaba girando apenas em torno do preço.\n\nNo fim das contas, valor não é aquilo que a clínica diz que entrega.\n\nÉ aquilo que o paciente percebe.\n\nNa sua opinião, o que mais aumenta o valor percebido de uma clínica?", carrossel:["Preço e valor não são a mesma coisa.", "O paciente compra muito mais do que um procedimento.", "Ele compra confiança.", "Compra tranquilidade.", "Compra atenção.", "Compra organização.", "Tudo isso aumenta o valor percebido.", "Sua clínica entrega valor ou apenas informa preços?"], reels:"\"Muita gente acha que o paciente escolhe apenas pelo preço.\n\nMas isso não é verdade.\n\nO paciente escolhe pelo valor que percebe.\n\nE esse valor é construído em cada detalhe da experiência.\n\nQuando tudo funciona bem, o preço deixa de ser o centro da conversa.\n\nExperiência gera valor.\n\nValor reduz a comparação por preço.\"", stories:["O que pesa mais na decisão do paciente?\n\n⬜ Preço\n\n⬜ Confiança", "Na maioria das vezes, confiança aumenta o valor percebido.", "Sua clínica comunica valor ou apenas orçamento?"], whatsapp:"Olá!\n\nGostaríamos de agradecer por confiar na nossa equipe.\n\nSabemos que escolher uma clínica envolve muito mais do que comparar preços. Por isso, trabalhamos diariamente para oferecer uma experiência segura, acolhedora e transparente.\n\nSe precisar de qualquer orientação, estamos à disposição.", prompt:"Crie uma legenda para Instagram mostrando a diferença entre preço e valor percebido na experiência do paciente. Utilize linguagem simples, exemplos práticos e finalize com uma pergunta." },
  C04: { legenda:"Muita gente acredita que o paciente escolhe uma clínica pela estrutura, pelo preço ou pela localização.\n\nTudo isso influencia.\n\nMas existe algo que pesa ainda mais.\n\nA emoção.\n\nO paciente pode esquecer exatamente tudo o que foi explicado durante a consulta.\n\nMas dificilmente esquece como se sentiu.\n\nSe foi ouvido.\n\nSe foi acolhido.\n\nSe percebeu atenção.\n\nSe saiu mais tranquilo do que entrou.\n\nÉ por isso que experiência do paciente vai muito além de processos.\n\nEla envolve pessoas.\n\nPorque no final do dia ninguém lembra apenas do que aconteceu.\n\nAs pessoas lembram de como se sentiram.\n\nQue emoção sua clínica desperta em quem passa por ela?", carrossel:["O paciente pode esquecer o que você falou.\n\nMas dificilmente esquece como você fez ele se sentir.", "Experiência é emoção.", "É sentir segurança.", "É sentir acolhimento.", "É sentir respeito.", "É sentir tranquilidade.", "Toda clínica gera emoções.", "A pergunta é: quais emoções sua clínica desperta?"], reels:"\"Sabe por que duas clínicas podem oferecer praticamente o mesmo tratamento e mesmo assim uma ser lembrada?\n\nPor causa da emoção.\n\nO paciente esquece muitas informações.\n\nMas ele lembra se foi bem recebido.\n\nSe sentiu segurança.\n\nSe percebeu atenção.\n\nExperiência do paciente é isso.\n\nÉ fazer com que alguém saia melhor do que entrou.\"", stories:["Você lembra mais do atendimento...\n\n⬜ Ou da forma como foi tratado?", "As pessoas esquecem detalhes.\n\nMas lembram emoções.", "Que emoção sua clínica deixa no paciente?"], whatsapp:"Olá!\n\nEsperamos que você esteja bem.\n\nMais do que realizar um atendimento, nosso objetivo é que você se sinta acolhido e seguro durante toda a sua jornada conosco.\n\nSe precisar conversar ou tirar qualquer dúvida, estamos por aqui.", prompt:"Crie uma legenda para Instagram mostrando como as emoções influenciam a experiência do paciente. Utilize linguagem simples, exemplos cotidianos e um tom acolhedor." },
  C05: { legenda:"Nem todo paciente que desiste de um tratamento fez isso por causa do preço.\n\nMuitos desistem por medo.\n\nMedo de sentir dor.\n\nMedo de não dar certo.\n\nMedo de investir.\n\nMedo de tomar a decisão errada.\n\nO problema é que, muitas vezes, a clínica responde apenas à pergunta.\n\nMas esquece de acolher o sentimento.\n\nE quando isso acontece, o paciente continua inseguro.\n\nAtender bem também é entender que toda decisão importante vem acompanhada de dúvidas.\n\nQuem consegue reduzir esses medos cria muito mais confiança.\n\nE confiança gera relacionamento.\n\nQual é o maior medo que seus pacientes demonstram antes de iniciar um tratamento?", carrossel:["Nem toda objeção é falta de dinheiro.", "Às vezes é medo.", "Medo de errar.", "Medo da dor.", "Medo do resultado.", "Medo do desconhecido.", "Quem acolhe o medo cria confiança.", "Sua clínica responde perguntas ou acolhe sentimentos?"], reels:"\"Quando um paciente diz que vai pensar...\n\nNem sempre ele está falando de dinheiro.\n\nÀs vezes ele está com medo.\n\nE esse medo precisa ser acolhido.\n\nPorque pessoas não tomam decisões apenas com lógica.\n\nElas decidem também com emoção.\n\nQuem entende isso constrói muito mais confiança.\"", stories:["Você acredita que todo paciente que diz \"vou pensar\" está falando de preço?\n\n⬜ Sim\n\n⬜ Não", "Na maioria das vezes existe um medo por trás.", "Sua clínica ajuda o paciente a se sentir seguro?"], whatsapp:"Olá!\n\nSabemos que iniciar um tratamento pode gerar dúvidas e insegurança.\n\nPor isso, queremos reforçar que nossa equipe está disponível para esclarecer qualquer questão antes de você tomar sua decisão.\n\nConte conosco.", prompt:"Crie uma legenda mostrando que muitos pacientes não desistem por preço, mas por insegurança. O texto deve ser humano e acolhedor." },
  C06: { legenda:"A ansiedade faz parte da vida de muitos pacientes.\n\nEsperar um resultado.\n\nEsperar uma consulta.\n\nEsperar uma resposta.\n\nEsperar um diagnóstico.\n\nTudo isso gera tensão.\n\nE a clínica pode escolher entre aumentar essa ansiedade...\n\n...ou ajudar a diminuí-la.\n\nUma resposta rápida.\n\nUma informação clara.\n\nUm aviso sobre atraso.\n\nUma explicação simples.\n\nSão pequenos detalhes que fazem uma enorme diferença.\n\nPorque experiência também é transmitir tranquilidade.\n\nNo final, pacientes não procuram apenas tratamento.\n\nEles procuram segurança.\n\nSua clínica reduz ou aumenta a ansiedade de quem procura atendimento?", carrossel:["A ansiedade do paciente começa muito antes da consulta.", "Ela aparece enquanto espera.", "Enquanto aguarda uma resposta.", "Enquanto imagina o resultado.", "A comunicação pode reduzir tudo isso.", "Informação gera segurança.", "Segurança melhora a experiência.", "Sua clínica transmite tranquilidade?"], reels:"\"Uma das maiores dores dos pacientes é a ansiedade.\n\nEsperar um retorno.\n\nEsperar uma resposta.\n\nEsperar um exame.\n\nE muitas vezes basta uma mensagem simples para reduzir toda essa preocupação.\n\nExperiência do paciente também é comunicação.\n\nE comunicar bem é cuidar.\"", stories:["Você já ficou ansioso esperando resposta de uma empresa?\n\n⬜ Sim\n\n⬜ Muito", "Agora imagine um paciente.", "Responder também é cuidar."], whatsapp:"Olá!\n\nPassando para saber como você está.\n\nSabemos que momentos de espera podem gerar ansiedade.\n\nSe precisar de qualquer informação ou esclarecimento, basta responder esta mensagem.\n\nEstamos à disposição para ajudar.", prompt:"Escreva uma legenda para Instagram mostrando como uma comunicação clara reduz a ansiedade dos pacientes durante sua jornada na clínica." },
  C07: { legenda:"Grande parte das reclamações que uma clínica recebe não acontece porque o atendimento foi ruim.\n\nAcontece porque a expectativa era outra.\n\nO paciente imaginou um prazo diferente.\n\nEsperava um resultado diferente.\n\nAchou que o procedimento seria mais simples.\n\nOu acreditou que teria um acompanhamento diferente.\n\nPercebe?\n\nNa maioria das vezes o problema não é a experiência.\n\nÉ a expectativa.\n\nQuanto mais clara for a comunicação da sua clínica, menor será a chance de frustração.\n\nPrometer menos e entregar mais ainda continua sendo uma das melhores estratégias para conquistar pacientes.\n\nSua clínica cria expectativas ou ajuda o paciente a entender exatamente o que vai acontecer?", carrossel:["Nem toda reclamação vem de um atendimento ruim.", "Muitas vêm de expectativas mal alinhadas.", "O paciente imaginou uma coisa.", "A clínica entregou outra.", "A frustração apareceu.", "Comunicação evita esse problema.", "Quem explica melhor, decepciona menos.", "Sua clínica alinha expectativas desde o primeiro contato?"], reels:"\"Sabe onde nascem muitas reclamações?\n\nNa expectativa.\n\nO paciente cria uma imagem na cabeça.\n\nSe a clínica não explica o processo com clareza, essa expectativa cresce sozinha.\n\nDepois vem a frustração.\n\nExperiência também é alinhar expectativas.\"", stories:["Você explica todas as etapas do atendimento?\n\n⬜ Sempre\n\n⬜ Às vezes", "Quanto mais clara a comunicação...\n\nMenor a frustração.", "Sua clínica promete ou esclarece?"], whatsapp:"Olá!\n\nGostaríamos de explicar como será sua próxima etapa de atendimento para que você tenha tranquilidade durante todo o processo.\n\nCaso tenha qualquer dúvida, nossa equipe está à disposição.", prompt:"Escreva uma legenda para Instagram mostrando como expectativas mal alinhadas geram insatisfação nos pacientes." },
  C08: { legenda:"Nem todo paciente quer a mesma coisa.\n\nAlguns gostam de explicações detalhadas.\n\nOutros preferem objetividade.\n\nTem quem queira conversar.\n\nTem quem queira resolver tudo rapidamente.\n\nE está tudo bem.\n\nO erro é acreditar que existe um único jeito de atender.\n\nQuanto mais sua equipe aprende a identificar diferentes perfis, melhor será a experiência entregue.\n\nExperiência personalizada não significa tratar cada paciente de forma diferente.\n\nSignifica entender o que cada pessoa realmente precisa.\n\nSua equipe consegue perceber essas diferenças?", carrossel:["Todo paciente é diferente.", "Alguns querem conversar.", "Outros querem rapidez.", "Alguns fazem muitas perguntas.", "Outros só querem segurança.", "Não existe atendimento padrão.", "Existe atendimento personalizado.", "Sua clínica conhece seus pacientes?"], reels:"\"Você já percebeu que alguns pacientes fazem dez perguntas...\n\nE outros quase não falam?\n\nÉ porque pessoas são diferentes.\n\nQuem entende isso consegue personalizar a experiência.\n\nE pacientes gostam de se sentir compreendidos.\"", stories:["Todo paciente gosta do mesmo atendimento?\n\n⬜ Sim\n\n⬜ Não", "Conhecer pessoas melhora a experiência.", "Sua equipe consegue identificar diferentes perfis?"], whatsapp:"Olá!\n\nCada paciente possui necessidades diferentes.\n\nSempre que precisar de alguma orientação específica, conte conosco.\n\nQueremos oferecer um atendimento que faça sentido para você.", prompt:"Crie uma legenda mostrando a importância de adaptar a comunicação aos diferentes perfis de pacientes." },
  C09: { legenda:"Quando falamos em experiência do paciente, muita gente pensa apenas na consulta.\n\nMas a consulta é apenas um momento da jornada.\n\nEla começa quando o paciente encontra sua clínica.\n\nContinua no agendamento.\n\nNa confirmação.\n\nNa chegada.\n\nNa recepção.\n\nNa consulta.\n\nNo pagamento.\n\nNo retorno.\n\nE até no pós-atendimento.\n\nSe um único ponto dessa jornada falha, toda a experiência pode ser comprometida.\n\nPor isso, não olhe apenas para o consultório.\n\nOlhe para todo o caminho.", carrossel:["A consulta é apenas parte da jornada.", "Tudo começa antes.", "Google.", "Instagram.", "WhatsApp.", "Recepção.", "Consulta.", "Pós-consulta."], reels:"\"A consulta dura alguns minutos.\n\nA experiência dura muito mais.\n\nEla começa antes do paciente entrar.\n\nE continua depois que ele vai embora.\n\nQuem entende a jornada inteira consegue melhorar muito mais a experiência.\"", stories:["Onde começa a experiência?\n\n⬜ Na consulta\n\n⬜ Antes dela", "A resposta certa é...\n\nAntes.", "Sua clínica conhece toda a jornada?"], whatsapp:"Olá!\n\nEsperamos que sua experiência com nossa clínica esteja sendo positiva em todas as etapas.\n\nCaso tenha qualquer sugestão ou dúvida, ficaremos felizes em ouvir você.", prompt:"Crie uma legenda mostrando que a experiência do paciente acontece durante toda a jornada e não apenas na consulta." },
  C10: { legenda:"Comunicar não é falar.\n\nÉ fazer o outro entender.\n\nE isso muda completamente a experiência do paciente.\n\nMuitas clínicas utilizam termos técnicos.\n\nExplicações longas.\n\nInformações difíceis.\n\nEnquanto o paciente só quer entender o que vai acontecer.\n\nQuanto mais simples for sua comunicação...\n\nMaior será a confiança.\n\nPorque clareza gera segurança.\n\nE segurança melhora a experiência.", carrossel:["Comunicação não é falar.", "É fazer entender.", "Use palavras simples.", "Explique sem pressa.", "Confirme se o paciente compreendeu.", "Clareza reduz insegurança.", "Segurança melhora a experiência.", "Sua comunicação é simples?"], reels:"\"O maior erro na comunicação é acreditar que explicar é suficiente.\n\nNão é.\n\nÉ preciso garantir que o paciente realmente entendeu.\n\nExperiência também é clareza.\"", stories:["Você entende tudo que profissionais da saúde explicam?\n\n⬜ Sim\n\n⬜ Nem sempre", "Imagine então seus pacientes.", "Falar simples também é cuidar."], whatsapp:"Olá!\n\nGostaríamos de confirmar se todas as orientações ficaram claras.\n\nCaso tenha qualquer dúvida, basta responder esta mensagem.\n\nSerá um prazer ajudar.", prompt:"Escreva uma legenda mostrando como uma comunicação simples melhora a experiência do paciente." },
  C11: { legenda:"Existe uma grande diferença entre ouvir e escutar.\n\nOuvir é esperar sua vez de responder.\n\nEscutar é tentar compreender o que a outra pessoa realmente quer dizer.\n\nNa saúde, isso faz toda a diferença.\n\nMuitas vezes o paciente não procura apenas uma solução.\n\nEle procura alguém que realmente o escute.\n\nQuando isso acontece, nasce a confiança.\n\nE onde existe confiança...\n\nExiste relacionamento.", carrossel:["Você ouve...\n\nOu realmente escuta?", "Escutar exige atenção.", "Exige interesse.", "Exige empatia.", "O paciente percebe.", "Confiança aumenta.", "Relacionamentos ficam mais fortes.", "Sua equipe pratica escuta ativa?"], reels:"\"Uma das maiores necessidades de qualquer paciente é ser ouvido.\n\nNão apenas responder perguntas.\n\nMas sentir que alguém realmente está prestando atenção.\n\nEscutar é um dos maiores diferenciais da experiência do paciente.\"", stories:["Você sente que as pessoas realmente escutam?\n\n⬜ Sim\n\n⬜ Nem sempre", "Agora pense nos seus pacientes.", "Escutar também é cuidar."], whatsapp:"Olá!\n\nGostaríamos de saber como você está e se existe algo que possamos fazer para tornar sua experiência ainda melhor.\n\nSua opinião é muito importante para nós.", prompt:"Crie uma legenda para Instagram mostrando a diferença entre ouvir e escutar dentro da experiência do paciente. Utilize linguagem simples, emocional e consultiva." },
  C12: { legenda:"Você acredita que um paciente toma uma decisão apenas com base na lógica?\n\nSe fosse assim, todas as clínicas com o mesmo preço teriam os mesmos resultados.\n\nMas não é isso que acontece.\n\nA decisão de um paciente envolve confiança, segurança, emoção e percepção de valor.\n\nEle pensa.\n\nMas também sente.\n\nÉ por isso que experiência do paciente não serve apenas para encantar.\n\nEla ajuda as pessoas a decidirem com mais tranquilidade.\n\nQuanto mais segurança você transmite durante a jornada, menor a chance de o paciente adiar uma decisão importante.\n\nSua clínica ajuda o paciente a decidir ou apenas entrega informações?", carrossel:["Pacientes não decidem apenas pela razão.", "Eles também decidem pela confiança.", "Pela segurança.", "Pela forma como foram tratados.", "Pela clareza das informações.", "Pela experiência.", "Experiência reduz insegurança.", "Sua clínica facilita ou dificulta a decisão?"], reels:"\"Você já percebeu que duas clínicas podem oferecer exatamente o mesmo tratamento...\n\nE ainda assim uma fechar muito mais pacientes?\n\nIsso acontece porque decisão não depende apenas da técnica.\n\nDepende da experiência.\n\nQuando alguém se sente seguro, entendido e respeitado...\n\nDecidir fica muito mais fácil.\"", stories:["Você decide tudo apenas pela lógica?\n\n⬜ Sim\n\n⬜ Não", "Se nem você faz isso...\n\nSeus pacientes também não.", "Experiência influencia decisões."], whatsapp:"Olá!\n\nEsperamos que todas as informações tenham ficado claras.\n\nCaso ainda exista alguma dúvida antes de tomar sua decisão, conte com nossa equipe.\n\nEstamos aqui para ajudar você, sem pressão.", prompt:"Escreva uma legenda mostrando que pacientes tomam decisões utilizando razão e emoção ao mesmo tempo. Explique como a experiência influencia essa decisão." },
  C13: { legenda:"Toda vez que um paciente faz uma objeção...\n\nEle está dizendo uma coisa:\n\n\"Eu ainda não me sinto seguro.\"\n\nObjeção não é rejeição.\n\nÉ falta de clareza.\n\nÉ dúvida.\n\nÉ medo.\n\nÉ insegurança.\n\nE quando a clínica entende isso, ela deixa de responder automaticamente e passa a conversar.\n\nAs melhores clínicas não combatem objeções.\n\nElas ajudam o paciente a entender.\n\nComo sua equipe reage quando um paciente diz \"vou pensar\"?", carrossel:["Objeção não significa \"não\".", "Pode significar insegurança.", "Pode significar medo.", "Pode significar dúvida.", "Quem escuta entende.", "Quem entende orienta.", "Quem orienta gera confiança.", "Objeções são oportunidades de conversa."], reels:"\"Quando um paciente fala...\n\n'Vou pensar.'\n\nA maioria das clínicas tenta convencer.\n\nEu faria diferente.\n\nPrimeiro tentaria entender.\n\nPorque quase toda objeção nasce de uma insegurança.\n\nE insegurança se resolve com conversa.\"", stories:["Quando alguém diz \"vou pensar\"...\n\nVocê acha que é sempre preço?\n\n⬜ Sim\n\n⬜ Não", "Na maioria das vezes é insegurança.", "Escute antes de responder."], whatsapp:"Olá!\n\nGostaria de saber se ficou alguma dúvida sobre as informações que conversamos.\n\nSe houver qualquer questão, estaremos à disposição para esclarecer.\n\nQueremos que você tome sua decisão com tranquilidade.", prompt:"Crie uma legenda mostrando que objeções são oportunidades para gerar confiança e não momentos de pressão." },
  C14: { legenda:"Existe uma pergunta que toda clínica deveria fazer.\n\n\"Como foi sua experiência?\"\n\nParece simples.\n\nMas poucas fazem.\n\nE pior...\n\nMuitas acreditam que silêncio significa satisfação.\n\nNão significa.\n\nÀs vezes o paciente apenas decidiu não voltar.\n\nQuem mede satisfação consegue melhorar.\n\nQuem não mede...\n\nContinua imaginando.\n\nQuando foi a última vez que sua clínica perguntou ao paciente como ele se sentiu?", carrossel:["Silêncio não significa satisfação.", "Pergunte.", "Escute.", "Aprenda.", "Melhore.", "Repita.", "Esse é o ciclo da experiência.", "Você mede satisfação?"], reels:"\"Muitos gestores dizem:\n\n'Nunca recebemos reclamações.'\n\nMas isso não significa que todos estão satisfeitos.\n\nTalvez apenas ninguém tenha falado.\n\nPerguntar continua sendo uma das formas mais inteligentes de evoluir.\"", stories:["Sua clínica pergunta como foi a experiência?\n\n⬜ Sempre\n\n⬜ Raramente", "Quem pergunta...\n\nMelhora.", "Feedback é presente."], whatsapp:"Olá!\n\nSua opinião é muito importante para nós.\n\nComo foi sua experiência com nossa equipe?\n\nExiste algo que poderíamos fazer ainda melhor?", prompt:"Escreva uma legenda sobre a importância de medir satisfação dos pacientes de forma contínua." },
  C15: { legenda:"Fidelidade não acontece porque o paciente precisa voltar.\n\nEla acontece porque ele quer voltar.\n\nExiste uma enorme diferença.\n\nPacientes fiéis não permanecem apenas pela competência técnica.\n\nEles permanecem porque confiam.\n\nPorque lembram da experiência.\n\nPorque se sentem importantes.\n\nToda consulta é uma oportunidade de fortalecer esse relacionamento.\n\nNo final...\n\nFidelidade é consequência.\n\nNunca sorte.\n\nSua clínica cria pacientes fiéis ou apenas pacientes atendidos?", carrossel:["Fidelidade não acontece por acaso.", "Ela nasce da confiança.", "Do cuidado.", "Da atenção.", "Da constância.", "Da experiência.", "Tudo isso faz o paciente voltar.", "Sua clínica fideliza?"], reels:"\"Paciente fiel não volta apenas porque precisa.\n\nEle volta porque lembra.\n\nLembra da atenção.\n\nDo atendimento.\n\nDa segurança.\n\nDa experiência.\n\nÉ isso que constrói fidelidade.\"", stories:["O que faz um paciente voltar?\n\n⬜ Preço\n\n⬜ Experiência", "Experiência gera relacionamento.", "Relacionamento gera fidelidade."], whatsapp:"Olá!\n\nPassando para saber como você está.\n\nMesmo após sua consulta, continuamos à disposição para acompanhar sua evolução e esclarecer qualquer dúvida.\n\nConte sempre conosco.", prompt:"Crie uma legenda mostrando que fidelidade é construída através de experiências consistentes e relacionamento." },
  C16: { legenda:"Ninguém indica uma clínica apenas porque gostou do procedimento.\n\nAs pessoas indicam quando têm confiança suficiente para colocar o próprio nome naquela recomendação.\n\nPense nisso.\n\nQuando alguém indica sua clínica...\n\nTambém está colocando sua reputação em jogo.\n\nÉ por isso que indicação não se pede primeiro.\n\nEla se conquista.\n\nQuando a experiência é memorável...\n\nA indicação acontece naturalmente.\n\nSua clínica está criando histórias que merecem ser compartilhadas?", carrossel:["Indicação não se força.", "Ela acontece.", "Quando existe confiança.", "Boa experiência.", "Relacionamento.", "Memórias positivas.", "Pacientes felizes indicam.", "Sua clínica merece ser indicada?"], reels:"\"Você quer mais indicações?\n\nEntão pare de pensar apenas em pedir.\n\nComece a pensar em merecer.\n\nPorque pacientes indicam experiências.\n\nNão procedimentos.\"", stories:["Você costuma indicar empresas que gosta?\n\n⬜ Sim\n\n⬜ Claro", "Seus pacientes fazem o mesmo.", "O que sua clínica faz para merecer indicações?"], whatsapp:"Olá!\n\nEsperamos que sua experiência conosco tenha sido positiva.\n\nSe você acredita que podemos ajudar outras pessoas da mesma forma, ficaremos muito felizes em sermos lembrados.\n\nObrigado pela confiança.", prompt:"Crie uma legenda mostrando que indicações são consequência de uma experiência memorável e não apenas da qualidade técnica." },
  C17: { legenda:"Humanizar o atendimento não é chamar o paciente pelo nome.\n\nTambém não é oferecer café.\n\nMuito menos decorar a recepção.\n\nHumanizar é lembrar que, antes de qualquer procedimento, existe uma pessoa.\n\nCom medo.\n\nCom ansiedade.\n\nCom expectativas.\n\nÀs vezes, tudo o que ela precisa é sentir que alguém realmente se importa.\n\nA tecnologia evoluiu.\n\nOs equipamentos evoluíram.\n\nMas nada substitui um olhar atento, uma escuta verdadeira e uma conversa sem pressa.\n\nPorque pessoas nunca esquecem quando são tratadas como pessoas.\n\nNa sua clínica, o paciente é tratado como número ou como alguém importante?", carrossel:["Humanizar não é uma técnica.", "É uma escolha.", "É olhar.", "É escutar.", "É acolher.", "É demonstrar interesse.", "É cuidar de pessoas.", "Humanizar nunca sai de moda."], reels:"\"Existe uma palavra que todo mundo fala.\n\nHumanização.\n\nMas pouca gente pratica.\n\nHumanizar não é oferecer café.\n\nÉ fazer o paciente sentir que ele importa.\n\nQuando isso acontece...\n\nA experiência muda completamente.\"", stories:["O que é atendimento humanizado para você?", "Humanizar é fazer o paciente sentir que importa.", "Sua equipe demonstra isso todos os dias?"], whatsapp:"Olá!\n\nEsperamos que você esteja bem.\n\nQueríamos apenas saber como você está e lembrar que, sempre que precisar, estaremos por aqui.\n\nConte conosco.", prompt:"Crie uma legenda para Instagram mostrando que humanização vai além da simpatia e está relacionada ao cuidado genuíno com o paciente." },
  C18: { legenda:"Toda consulta deixa uma lembrança.\n\nMas nem toda lembrança é técnica.\n\nAlgumas são emocionais.\n\nO paciente lembra da tranquilidade.\n\nDa atenção.\n\nDo acolhimento.\n\nDa forma como foi recebido.\n\nÉ por isso que experiência do paciente não termina quando a consulta acaba.\n\nEla continua na memória.\n\nE essa memória influencia se ele volta.\n\nSe indica.\n\nOu se nunca mais aparece.\n\nExperiências são esquecidas.\n\nSentimentos permanecem.", carrossel:["O paciente esquece detalhes.", "Mas lembra sentimentos.", "Lembra da atenção.", "Da calma.", "Da confiança.", "Do respeito.", "Emoções criam lembranças.", "Que emoção sua clínica deixa?"], reels:"\"Você consegue lembrar do melhor atendimento que já recebeu?\n\nProvavelmente não lembra de tudo.\n\nMas lembra de como se sentiu.\n\nÉ exatamente isso que acontece com seus pacientes.\"", stories:["Você lembra mais...\n\n⬜ Informações\n\n⬜ Sentimentos", "Os pacientes também.", "Que emoção sua clínica desperta?"], whatsapp:"Olá!\n\nEsperamos que sua experiência conosco tenha sido tranquila.\n\nSe existir qualquer dúvida ou necessidade, estaremos sempre disponíveis para ajudar.", prompt:"Escreva uma legenda mostrando como emoções permanecem na memória dos pacientes." },
  C19: { legenda:"Tempo é uma das coisas mais valiosas que um paciente entrega para uma clínica.\n\nE quando ele percebe que esse tempo não foi respeitado...\n\nToda a experiência muda.\n\nEsperar acontece.\n\nImprevistos também.\n\nO problema nunca foi o atraso.\n\nO problema é o silêncio.\n\nÉ não explicar.\n\nÉ fazer o paciente sentir que o tempo dele vale menos.\n\nRespeitar o tempo é respeitar pessoas.\n\nE isso também faz parte da experiência.", carrossel:["Tempo também é cuidado.", "Todo paciente percebe atrasos.", "Mas entende imprevistos.", "O que ele não entende...", "É falta de comunicação.", "Explique.", "Peça desculpas quando necessário.", "Respeite o tempo das pessoas."], reels:"\"Você sabe qual é um dos maiores motivos de insatisfação em clínicas?\n\nNão é esperar.\n\nÉ esperar sem nenhuma informação.\n\nUma simples explicação muda completamente a experiência.\"", stories:["Você prefere esperar...\n\n⬜ Sabendo o motivo\n\n⬜ Sem informação", "Comunicação muda tudo.", "Respeite o tempo dos pacientes."], whatsapp:"Olá!\n\nInformamos que houve um pequeno atraso em nossa agenda.\n\nPedimos desculpas e agradecemos pela compreensão.\n\nEstamos trabalhando para atendê-lo o mais breve possível.", prompt:"Crie uma legenda mostrando que respeitar o tempo do paciente melhora significativamente sua experiência." },
  C20: { legenda:"Já percebeu como existem empresas que tornam tudo mais fácil?\n\nVocê agenda em poucos minutos.\n\nRecebe confirmação.\n\nConsegue tirar dúvidas.\n\nResolve tudo sem esforço.\n\nÉ exatamente isso que o paciente espera de uma clínica.\n\nExperiência também é facilitar a vida das pessoas.\n\nQuanto menos obstáculos existirem...\n\nMaior será a satisfação.\n\nPorque ninguém gosta de preencher cinco formulários quando uma mensagem resolveria.\n\nNem de ligar três vezes para conseguir um agendamento.\n\nConveniência não é luxo.\n\nÉ respeito pelo tempo do paciente.\n\nSe hoje você fosse paciente da sua clínica, encontraria facilidade ou burocracia?", carrossel:["Experiência também é facilidade.", "Agendar sem dificuldade.", "Receber respostas rápidas.", "Encontrar informações facilmente.", "Resolver tudo em poucos passos.", "Quanto menos esforço...", "Melhor a experiência.", "Sua clínica facilita ou complica?"], reels:"\"Uma boa experiência não é só atender bem.\n\nÉ facilitar a vida do paciente.\n\nQuanto menos etapas desnecessárias...\n\nMelhor.\n\nExperiência também significa conveniência.\"", stories:["Você gosta de processos complicados?\n\n⬜ Nunca\n\n⬜ Claro que não", "Se você não gosta...\n\nSeu paciente também não.", "Facilidade também encanta."], whatsapp:"Olá!\n\nCaso precise reagendar sua consulta ou esclarecer qualquer dúvida, basta responder esta mensagem.\n\nQueremos tornar todo o processo o mais simples possível para você.", prompt:"Crie uma legenda mostrando que facilitar a vida do paciente faz parte da experiência e aumenta sua satisfação." },
  C21: { legenda:"Existe uma enorme diferença entre atender um paciente...\n\nE fazer ele sentir que foi lembrado.\n\nQuando alguém chega à clínica e escuta seu nome.\n\nQuando a equipe lembra de uma conversa anterior.\n\nQuando pergunta como foi sua recuperação.\n\nQuando percebe detalhes.\n\nTudo muda.\n\nPorque personalização não significa fazer algo extraordinário.\n\nSignifica mostrar que aquele paciente não é apenas mais um horário na agenda.\n\nAs pessoas gostam de se sentir importantes.\n\nE isso custa muito menos do que imaginamos.\n\nO que sua clínica faz para que o paciente se sinta único?", carrossel:["Todo mundo gosta de se sentir importante.", "Lembrar o nome.", "Lembrar da história.", "Perguntar como está.", "Demonstrar atenção.", "Personalizar aproxima.", "Pequenos detalhes fazem diferença.", "Sua clínica conhece seus pacientes?"], reels:"\"Você não precisa fazer grandes investimentos para personalizar a experiência.\n\nÀs vezes basta lembrar o nome do paciente.\n\nPerguntar como ele está.\n\nOu lembrar da última conversa.\n\nPequenos gestos criam grandes relacionamentos.\"", stories:["Você gosta quando alguém lembra seu nome?\n\n⬜ Sim\n\n⬜ Muito", "Os pacientes também.", "Personalizar aproxima."], whatsapp:"Olá, [Nome]!\n\nPassando para saber como você está.\n\nEsperamos que sua recuperação esteja acontecendo conforme esperado.\n\nSe precisar de qualquer orientação, conte conosco.", prompt:"Crie uma legenda mostrando como pequenos gestos de personalização aumentam a conexão entre clínica e paciente." },
  C22: { legenda:"A maioria das pessoas não tem medo da verdade.\n\nTem medo da falta de informação.\n\nQuando o paciente entende exatamente o que vai acontecer...\n\nEle fica mais tranquilo.\n\nQuando entende valores.\n\nPrazos.\n\nEtapas.\n\nPossíveis resultados.\n\nEle se sente mais seguro.\n\nTransparência reduz ansiedade.\n\nReduz conflitos.\n\nE aumenta a confiança.\n\nQuem comunica com clareza evita muitos problemas antes mesmo que eles aconteçam.\n\nSua clínica comunica tudo com clareza ou deixa espaço para interpretações?", carrossel:["Transparência gera confiança.", "Explique processos.", "Explique prazos.", "Explique valores.", "Explique possibilidades.", "Quanto mais clareza...", "Mais segurança.", "Seu paciente entende tudo?"], reels:"\"Uma das maiores causas de insatisfação é a falta de informação.\n\nQuando a clínica explica tudo com clareza...\n\nO paciente se sente muito mais seguro.\n\nE segurança melhora toda a experiência.\"", stories:["Você prefere empresas transparentes?\n\n⬜ Sim\n\n⬜ Com certeza", "Seus pacientes também.", "Clareza gera confiança."], whatsapp:"Olá!\n\nGostaríamos de confirmar todas as informações referentes ao seu atendimento.\n\nSe houver qualquer dúvida sobre o processo, valores ou próximos passos, estamos à disposição.", prompt:"Escreva uma legenda mostrando como transparência reduz insegurança e fortalece a confiança do paciente." },
  C23: { legenda:"Existe uma diferença entre ser competente...\n\nE parecer competente.\n\nPode parecer estranho.\n\nMas a primeira percepção do paciente acontece muito antes dele conhecer seu trabalho.\n\nEla acontece quando ele vê seu Instagram.\n\nQuando lê as avaliações.\n\nQuando conversa pelo WhatsApp.\n\nQuando entra na recepção.\n\nTudo comunica.\n\nUma clínica pode ter excelentes profissionais.\n\nMas, se transmite desorganização, demora ou falta de cuidado...\n\nA credibilidade diminui.\n\nCredibilidade não é construída apenas pelo diploma na parede.\n\nEla é construída em cada experiência.\n\nO que sua clínica comunica antes mesmo da primeira consulta?", carrossel:["Credibilidade começa antes da consulta.", "Começa no Instagram.", "Continua no WhatsApp.", "Passa pela recepção.", "Chega ao consultório.", "Tudo comunica.", "Tudo influencia.", "Sua clínica transmite confiança?"], reels:"\"Você pode ser um excelente profissional.\n\nMas se sua comunicação transmite desorganização...\n\nO paciente percebe.\n\nCredibilidade não nasce apenas da técnica.\n\nEla nasce da experiência inteira.\"", stories:["Você compraria de uma empresa que parece desorganizada?\n\n⬜ Sim\n\n⬜ Não", "Seus pacientes também fazem esse julgamento.", "Credibilidade é construída nos detalhes."], whatsapp:"Olá!\n\nObrigado por confiar na nossa clínica.\n\nNosso compromisso é oferecer um atendimento transparente, organizado e seguro em todas as etapas da sua jornada.\n\nSempre que precisar, estaremos por aqui.", prompt:"Crie uma legenda para Instagram mostrando que credibilidade é construída pela soma de todas as experiências que o paciente vive com a clínica." },
  C24: { legenda:"Empatia não é concordar com tudo.\n\nÉ conseguir enxergar a situação pelo olhar do outro.\n\nO paciente que chega atrasado pode estar vindo de um momento difícil.\n\nO paciente que faz muitas perguntas pode estar inseguro.\n\nO paciente que parece impaciente pode estar preocupado.\n\nQuando a equipe aprende a olhar além do comportamento...\n\nO atendimento muda completamente.\n\nEmpatia reduz conflitos.\n\nAumenta confiança.\n\nFortalece relacionamentos.\n\nPorque, antes de qualquer tratamento, existe uma pessoa tentando resolver um problema.\n\nSua equipe responde ao comportamento ou procura entender o motivo dele?", carrossel:["Empatia muda atendimentos.", "Antes de responder...", "Procure entender.", "Toda atitude tem um motivo.", "Todo paciente tem uma história.", "Escute mais.", "Julgue menos.", "Empatia transforma experiências."], reels:"\"Nem sempre um paciente difícil...\n\nÉ realmente difícil.\n\nÀs vezes ele está com medo.\n\nAnsioso.\n\nPreocupado.\n\nQuando a equipe entende isso...\n\nA conversa muda completamente.\n\nEmpatia continua sendo um dos maiores diferenciais no atendimento.\"", stories:["Você já foi mal interpretado?\n\n⬜ Sim\n\n⬜ Muitas vezes", "Seus pacientes também.", "Empatia melhora qualquer relacionamento."], whatsapp:"Olá!\n\nEsperamos que esteja tudo bem com você.\n\nCaso exista qualquer dificuldade, dúvida ou necessidade, estamos disponíveis para conversar.\n\nSerá um prazer ajudar.", prompt:"Crie uma legenda mostrando que empatia é compreender o paciente antes de responder, utilizando exemplos simples do dia a dia." },
  C25: { legenda:"Muita gente acredita que encantar um paciente exige grandes investimentos.\n\nNão exige.\n\nNa maioria das vezes...\n\nEncantar está nos pequenos detalhes.\n\nEm lembrar o nome.\n\nEm perguntar como a pessoa está.\n\nEm responder com atenção.\n\nEm fazer um acompanhamento depois da consulta.\n\nEm resolver um problema rapidamente.\n\nEncantar é entregar um pouco mais do que o paciente esperava.\n\nE é exatamente isso que faz uma experiência deixar de ser comum para se tornar memorável.\n\nNo final...\n\nAs pessoas esquecem preços.\n\nEsquecem datas.\n\nMas lembram de quem fez elas se sentirem especiais.\n\nQual foi a última vez que sua clínica surpreendeu positivamente um paciente?", carrossel:["Encantar não custa caro.", "Custa atenção.", "Custa cuidado.", "Custa presença.", "Pequenos detalhes.", "Grandes lembranças.", "Experiências memoráveis.", "Sua clínica encanta ou apenas atende?"], reels:"\"Você não precisa investir milhares de reais para encantar um paciente.\n\nÀs vezes...\n\nUma ligação.\n\nUma mensagem.\n\nUm retorno inesperado.\n\nUm cuidado que ninguém esperava.\n\nJá faz toda a diferença.\n\nPorque encantamento mora nos detalhes.\"", stories:["O que mais marca você em um atendimento?\n\n⬜ Atenção\n\n⬜ Estrutura", "Na maioria das vezes...\n\nSão os pequenos gestos.", "Como sua clínica pode surpreender mais?"], whatsapp:"Olá!\n\nPassando apenas para agradecer por confiar na nossa equipe.\n\nEsperamos que sua experiência tenha sido positiva.\n\nSeguimos à disposição sempre que precisar.\n\nFoi um prazer cuidar de você.", prompt:"Crie uma legenda para Instagram mostrando que encantamento acontece através de pequenos gestos e não apenas de grandes investimentos.\n\nTEMA 24 — EMPATIA" },
  E01: { legenda:"Existe uma pergunta que toda clínica deveria responder no final do dia.\n\n\"O que podemos fazer melhor amanhã?\"\n\nNão precisa ser uma grande mudança.\n\nÀs vezes basta melhorar uma mensagem.\n\nReduzir um minuto de espera.\n\nExplicar um procedimento com mais clareza.\n\nLembrar o nome de um paciente.\n\nExcelência não acontece de uma vez.\n\nEla é construída todos os dias.\n\nPequenas melhorias constantes transformam clínicas comuns em clínicas memoráveis.\n\nQuem melhora continuamente nunca fica parado.\n\nE quem nunca para de evoluir dificilmente fica para trás.\n\nQual foi a última melhoria que sua clínica implementou?", carrossel:["Excelência não acontece de repente.", "Ela acontece todos os dias.", "Uma melhoria.", "Depois outra.", "Depois mais uma.", "A evolução é contínua.", "Nunca pare de melhorar.", "Qual será sua próxima melhoria?"], reels:"\"Você não precisa revolucionar sua clínica amanhã.\n\nBasta melhorar 1% todos os dias.\n\nDepois de um ano...\n\nSua clínica será completamente diferente.\"", stories:["Sua clínica melhora continuamente?\n\n⬜ Sim\n\n⬜ Ainda pouco", "Grandes resultados começam com pequenas mudanças.", "Qual será sua próxima evolução?"], whatsapp:"Olá!\n\nEstamos constantemente buscando melhorar nossos processos para oferecer uma experiência cada vez melhor.\n\nSe tiver alguma sugestão, será um prazer ouvir você.", prompt:"Crie uma legenda mostrando como pequenas melhorias diárias transformam a experiência do paciente." },
  E02: { legenda:"Experiência do paciente não é um projeto.\n\nÉ uma cultura.\n\nQuando apenas uma pessoa se preocupa com isso...\n\nOs resultados são limitados.\n\nMas quando toda a equipe entende que cada detalhe importa...\n\nA clínica muda.\n\nExperiência não pertence ao marketing.\n\nNem à recepção.\n\nNem ao gestor.\n\nPertence a todos.\n\nE quando isso acontece...\n\nOs pacientes percebem.\n\nSua clínica possui ações de experiência ou uma cultura de experiência?", carrossel:["Experiência não é um departamento.", "É uma cultura.", "Todos participam.", "Todos influenciam.", "Todos comunicam.", "Todos cuidam.", "Essa é a diferença.", "Como está a cultura da sua clínica?"], reels:"\"Experiência do paciente não depende apenas da recepção.\n\nDepende da cultura da clínica inteira.\"", stories:["Quem é responsável pela experiência?\n\n⬜ Toda equipe\n\n⬜ Apenas a recepção", "Experiência é cultura.", "Construa isso diariamente."], whatsapp:"Olá!\n\nNosso compromisso é evoluir continuamente para oferecer uma experiência cada vez melhor em cada atendimento.", prompt:"Crie uma legenda mostrando que experiência do paciente é uma cultura organizacional." },
  E03: { legenda:"Inovar não significa comprar equipamentos novos.\n\nSignifica melhorar a vida do paciente.\n\nSe uma mudança facilita o atendimento...\n\nEla é inovação.\n\nSe reduz ansiedade...\n\nTambém é inovação.\n\nSe aproxima a clínica das pessoas...\n\nTambém.\n\nInovação começa quando alguém pergunta:\n\n\"Existe um jeito melhor de fazer isso?\"\n\nEssa pergunta muda negócios.\n\nQuando foi a última vez que sua clínica inovou pensando no paciente?", carrossel:["Inovar não é gastar mais.", "É facilitar.", "É simplificar.", "É melhorar.", "É ouvir pacientes.", "É testar.", "É evoluir.", "Sua clínica inova?"], reels:"\"Inovação não começa na tecnologia.\n\nComeça na vontade de melhorar a experiência.\"", stories:["Sua clínica testa novas ideias?\n\n⬜ Sempre\n\n⬜ Raramente", "Inovação melhora experiências.", "Nunca pare de testar."], whatsapp:"Olá!\n\nEstamos implementando melhorias para tornar sua experiência ainda mais simples e confortável.\n\nObrigado por fazer parte dessa evolução.", prompt:"Crie uma legenda mostrando que inovação começa pela melhoria da experiência do paciente." },
  E04: { legenda:"Hoje existem muitas clínicas.\n\nBons profissionais também.\n\nEntão...\n\nO que faz alguém escolher justamente a sua?\n\nA resposta dificilmente será apenas preço.\n\nOu localização.\n\nNa maioria das vezes...\n\nÉ a experiência.\n\nÉ o atendimento.\n\nÉ o relacionamento.\n\nÉ a confiança.\n\nDiferenciação não acontece porque você diz que é diferente.\n\nEla acontece quando o paciente percebe isso.\n\nO que faz sua clínica ser lembrada?", carrossel:["Ser diferente é ser lembrado.", "Experiência diferencia.", "Relacionamento diferencia.", "Confiança diferencia.", "Atendimento diferencia.", "Tudo comunica.", "Tudo soma.", "Qual é seu diferencial?"], reels:"\"Você não precisa ser a clínica mais barata.\n\nPrecisa ser a mais lembrada.\"", stories:["Por que alguém escolhe sua clínica?", "Existe um diferencial claro?", "Experiência diferencia."], whatsapp:"Olá!\n\nObrigado por escolher nossa clínica.\n\nSeguiremos trabalhando para oferecer uma experiência que faça essa escolha valer a pena.", prompt:"Crie uma legenda mostrando como experiência do paciente é um dos maiores diferenciais competitivos." },
  E05: { legenda:"As necessidades dos pacientes mudam.\n\nOs comportamentos mudam.\n\nA tecnologia muda.\n\nO mercado muda.\n\nE sua clínica?\n\nQuem não evolui junto com os pacientes...\n\nAcaba ficando distante deles.\n\nEvoluir significa observar.\n\nOuvir.\n\nAdaptar.\n\nMelhorar.\n\nA experiência do paciente nunca estará pronta.\n\nPorque pessoas mudam o tempo todo.\n\nSua clínica está acompanhando essa evolução?", carrossel:["Os pacientes mudam.", "O mercado muda.", "As expectativas mudam.", "Sua clínica acompanha?", "Observe.", "Adapte.", "Evolua.", "Nunca fique parado."], reels:"\"Quem para de evoluir...\n\nComeça a ficar para trás.\n\nExperiência é movimento.\"", stories:["Sua clínica evoluiu no último ano?\n\n⬜ Muito\n\n⬜ Pouco", "Continue evoluindo.", "Os pacientes percebem isso."], whatsapp:"Olá!\n\nEstamos sempre buscando novas formas de oferecer um atendimento mais moderno, humano e eficiente.\n\nObrigado por fazer parte da nossa evolução.", prompt:"Crie uma legenda mostrando que clínicas precisam evoluir junto com seus pacientes." },
  E06: { legenda:"Toda clínica quer melhorar.\n\nMas poucas fazem uma pergunta simples:\n\n\"O que nossos pacientes fariam diferente?\"\n\nQuem está dentro da operação nem sempre enxerga tudo.\n\nJá quem vive a experiência...\n\nEnxerga.\n\nFeedback não serve para validar o que já fazemos bem.\n\nServe para mostrar aquilo que ainda não percebemos.\n\nCada sugestão é uma oportunidade.\n\nCada crítica é um diagnóstico.\n\nE toda melhoria começa ouvindo alguém.\n\nSua clínica coleta feedback para cumprir tabela ou para realmente evoluir?", carrossel:["Quem mais pode ensinar sua clínica?", "Seus pacientes.", "Pergunte.", "Escute.", "Analise.", "Implemente.", "Evolua.", "Feedback gera crescimento."], reels:"\"Quer saber onde estão as maiores oportunidades da sua clínica?\n\nPergunte para quem vive a experiência.\n\nOs pacientes sempre deixam pistas.\"", stories:["Você costuma pedir feedback?\n\n⬜ Sempre\n\n⬜ Às vezes", "Quem escuta evolui.", "Toda opinião ensina."], whatsapp:"Olá!\n\nSua opinião é muito importante para nossa evolução.\n\nExiste alguma sugestão que possa tornar sua experiência ainda melhor?", prompt:"Crie uma legenda mostrando como feedbacks ajudam clínicas a evoluírem continuamente." },
  E07: { legenda:"O mercado muda.\n\nOs pacientes mudam.\n\nOs hábitos mudam.\n\nQuem não muda junto...\n\nFica para trás.\n\nAdaptar não significa perder identidade.\n\nSignifica continuar relevante.\n\nAs melhores clínicas não são as que fazem tudo igual há vinte anos.\n\nSão aquelas que mantêm seus valores, mas atualizam sua forma de atender.\n\nPorque evoluir é respeitar o presente.\n\nSua clínica ainda atende como há cinco anos?", carrossel:["Quem não evolui...", "Fica para trás.", "Observe o mercado.", "Observe seus pacientes.", "Adapte processos.", "Atualize experiências.", "Continue relevante.", "Mudança faz parte do crescimento."], reels:"\"O paciente de hoje não é igual ao de cinco anos atrás.\n\nSua clínica também não pode ser.\"", stories:["Sua clínica mudou nos últimos anos?\n\n⬜ Muito\n\n⬜ Pouco", "Mudança faz parte da evolução.", "Continue aprendendo."], whatsapp:"Olá!\n\nEstamos atualizando constantemente nossos processos para acompanhar as necessidades dos nossos pacientes.\n\nObrigado por evoluir conosco.", prompt:"Crie uma legenda mostrando como adaptação mantém uma clínica competitiva.\n\nTEMA 07 — ADAPTAÇÃO" },
  E08: { legenda:"Excelência não é fazer algo incrível uma vez.\n\nÉ fazer o básico muito bem...\n\nTodos os dias.\n\nÉ responder mensagens com atenção.\n\nCumprir horários.\n\nOlhar nos olhos.\n\nCumprir promessas.\n\nExcelência é repetição.\n\nQuem entrega qualidade apenas quando tudo está perfeito...\n\nAinda não encontrou a excelência.\n\nEla aparece justamente nos dias difíceis.\n\nSua clínica busca perfeição ou constância?", carrossel:["Excelência é hábito.", "Não sorte.", "Repita boas práticas.", "Todos os dias.", "Com toda equipe.", "Em todos os atendimentos.", "Constância gera confiança.", "Excelência é cultura."], reels:"\"Excelência não aparece em um grande dia.\n\nEla aparece na rotina.\"", stories:["Excelência é...\n\n⬜ Um evento\n\n⬜ Um hábito", "Repita o que funciona.", "Constância vence intensidade."], whatsapp:"Olá!\n\nNosso compromisso é buscar excelência em cada atendimento.\n\nObrigado por confiar em nosso trabalho.", prompt:"Crie uma legenda mostrando que excelência é resultado de hábitos consistentes." },
  E09: { legenda:"Cada vez mais clínicas oferecem bons tratamentos.\n\nEntão por que algumas crescem mais que outras?\n\nPorque a diferença deixou de estar apenas na técnica.\n\nHoje ela está na experiência.\n\nNa facilidade.\n\nNa atenção.\n\nNa comunicação.\n\nNa confiança.\n\nPacientes esquecem detalhes técnicos.\n\nMas nunca esquecem como foram tratados.\n\nQuem entende isso...\n\nDeixa de competir apenas por preço.\n\nSua clínica vende procedimentos ou entrega experiências?", carrossel:["A técnica aproxima.", "A experiência fideliza.", "Relacionamento.", "Comunicação.", "Cuidado.", "Tudo diferencia.", "Experiência vende.", "Destaque-se."], reels:"\"Hoje, experiência vale tanto quanto competência.\n\nE quem une as duas coisas...\n\nConstrói clínicas inesquecíveis.\"", stories:["O que diferencia uma clínica?\n\n⬜ Equipamentos\n\n⬜ Experiência", "Os dois importam.\n\nMas um fideliza.", "Experiência é vantagem competitiva."], whatsapp:"Olá!\n\nObrigado por escolher nossa clínica.\n\nSeguiremos trabalhando para tornar cada atendimento uma experiência positiva.", prompt:"Crie uma legenda mostrando que experiência do paciente é um diferencial competitivo sustentável." },
  E10: { legenda:"Nenhuma clínica evolui mais rápido do que sua equipe.\n\nVocê pode comprar tecnologia.\n\nReformar ambientes.\n\nCriar processos.\n\nMas são as pessoas que transformam tudo isso em experiência.\n\nInvestir na equipe é investir no paciente.\n\nQuando a equipe cresce...\n\nA clínica cresce junto.\n\nE o paciente percebe essa evolução em cada atendimento.\n\nQuanto sua clínica investe no desenvolvimento das pessoas?", carrossel:["Toda evolução começa pelas pessoas.", "Aprender.", "Treinar.", "Compartilhar.", "Praticar.", "Melhorar.", "Evoluir juntos.", "Equipe forte cria clínicas fortes."], reels:"\"Você quer melhorar a experiência do paciente?\n\nComece desenvolvendo quem cuida dele todos os dias.\"", stories:["Sua equipe aprende continuamente?\n\n⬜ Sim\n\n⬜ Ainda pouco", "Conhecimento gera evolução.", "Pessoas transformam experiências."], whatsapp:"Olá!\n\nNossa equipe participa constantemente de treinamentos para oferecer um atendimento cada vez melhor.\n\nObrigado por fazer parte da nossa evolução.", prompt:"Crie uma legenda mostrando como investir no desenvolvimento da equipe melhora diretamente a experiência do paciente." },
  E11: { legenda:"Existe uma diferença entre uma clínica que cresce...\n\nE uma clínica que evolui.\n\nCrescer pode significar atender mais pacientes.\n\nEvoluir significa atender melhor.\n\nÉ possível aumentar o faturamento sem melhorar a experiência.\n\nMas é impossível manter esse crescimento por muito tempo sem evoluir.\n\nClínicas que evoluem fazem perguntas constantemente.\n\n\"O que podemos melhorar?\"\n\n\"O que aprendemos este mês?\"\n\n\"O que nossos pacientes estão tentando nos mostrar?\"\n\nQuem para de aprender...\n\nComeça a ficar para trás.\n\nSua clínica mede apenas resultados ou também mede evolução?", carrossel:["Crescer é importante.", "Evoluir é essencial.", "Questione.", "Aprenda.", "Implemente.", "Repita.", "Nunca pare.", "Evolução é um hábito."], reels:"\"Tem uma pergunta que toda clínica deveria fazer semanalmente.\n\n'O que aprendemos essa semana?'\n\nQuem aprende continuamente nunca para de evoluir.\"", stories:["Sua clínica aprende continuamente?\n\n⬜ Sim\n\n⬜ Ainda pouco", "Aprender é evoluir.", "Quem evolui cresce."], whatsapp:"Olá!\n\nEstamos constantemente aprendendo para oferecer uma experiência cada vez melhor.\n\nObrigado por caminhar conosco.", prompt:"Crie uma legenda mostrando que evolução começa por uma mentalidade de aprendizado contínuo." },
  E12: { legenda:"Os pacientes percebem detalhes que muitas vezes passam despercebidos pela equipe.\n\nA cadeira desconfortável.\n\nA música alta.\n\nO café vazio.\n\nO atraso sem explicação.\n\nA resposta automática.\n\nSão pequenos pontos.\n\nMas pequenas experiências constroem grandes percepções.\n\nQuem aprende a observar detalhes...\n\nComeça a entregar experiências muito melhores.\n\nExcelência mora nos detalhes.\n\nQuais detalhes da sua clínica você deixou de enxergar por estar acostumado com eles?", carrossel:["Experiências são feitas de detalhes.", "Observe.", "Anote.", "Corrija.", "Melhore.", "Repita.", "Detalhes encantam.", "Olhe como um paciente."], reels:"\"Existe uma pergunta poderosa.\n\nSe eu fosse paciente da minha própria clínica...\n\nO que eu perceberia?\"", stories:["Quando foi a última vez que você percorreu sua clínica como paciente?\n\n⬜ Hoje\n\n⬜ Nunca", "Olhe pelos olhos do paciente.", "Os detalhes contam."], whatsapp:"Olá!\n\nEstamos revisando constantemente nossos processos para cuidar dos pequenos detalhes que fazem diferença na sua experiência.", prompt:"Crie uma legenda mostrando que excelência é construída pela atenção aos detalhes." },
  E13: { legenda:"Toda clínica erra.\n\nA diferença é o que ela faz depois.\n\nAlgumas escondem os erros.\n\nOutras aprendem com eles.\n\nErro sem aprendizado vira desperdício.\n\nErro com aprendizado vira evolução.\n\nO objetivo não é encontrar culpados.\n\nÉ impedir que o mesmo problema aconteça novamente.\n\nClínicas excelentes não erram menos.\n\nElas aprendem mais rápido.\n\nSua equipe registra os aprendizados ou apenas resolve o problema?", carrossel:["Errar é humano.", "Aprender é estratégico.", "Analise.", "Entenda.", "Corrija.", "Compartilhe.", "Evolua.", "Não desperdice erros."], reels:"\"Um erro pode custar caro.\n\nMas desperdiçar o aprendizado custa muito mais.\"", stories:["Sua equipe aprende com os erros?\n\n⬜ Sim\n\n⬜ Nem sempre", "Todo erro ensina.", "Não desperdice aprendizados."], whatsapp:"Olá!\n\nSempre buscamos aprender com cada experiência para oferecer um atendimento ainda melhor.\n\nObrigado por contribuir com nossa evolução.", prompt:"Crie uma legenda mostrando como aprender com erros fortalece a experiência do paciente." },
  E14: { legenda:"Existe um grupo de pessoas que conhece profundamente a experiência do paciente.\n\nSua equipe.\n\nEla enxerga dificuldades.\n\nPercebe oportunidades.\n\nEscuta reclamações.\n\nRecebe elogios.\n\nIgnorar essas pessoas é desperdiçar conhecimento.\n\nUma cultura de evolução também escuta quem está na operação.\n\nAs melhores ideias muitas vezes vêm de quem atende pacientes todos os dias.\n\nSua equipe participa das melhorias da clínica?", carrossel:["Quem atende...\n\nAprende.", "Quem aprende...\n\nContribui.", "Escute sua equipe.", "Valorize ideias.", "Implemente melhorias.", "Compartilhe resultados.", "Cresçam juntos.", "Toda equipe pode inovar."], reels:"\"Quer melhorar sua clínica?\n\nComece ouvindo quem está na linha de frente.\"", stories:["Sua equipe sugere melhorias?\n\n⬜ Sempre\n\n⬜ Raramente", "Boas ideias estão na operação.", "Escute mais."], whatsapp:"Olá!\n\nNossa equipe trabalha diariamente para evoluir nossos processos e oferecer uma experiência cada vez melhor.\n\nObrigado por confiar em nós.", prompt:"Crie uma legenda mostrando a importância de ouvir a equipe para melhorar a experiência do paciente." },
  E15: { legenda:"Toda clínica toma decisões.\n\nA pergunta é:\n\nBaseadas em quê?\n\nAchismo?\n\nExperiência?\n\nOu dados?\n\nOs números contam histórias.\n\nMostram atrasos.\n\nCancelamentos.\n\nRetornos.\n\nSatisfação.\n\nIndicam onde melhorar.\n\nQuem decide olhando dados...\n\nErra menos.\n\nE evolui mais rápido.\n\nQuais dados orientam as decisões da sua clínica?", carrossel:["Dados reduzem achismos.", "Observe indicadores.", "Entenda padrões.", "Descubra oportunidades.", "Tome decisões.", "Implemente melhorias.", "Meça novamente.", "Evolução baseada em dados."], reels:"\"Quem melhora no achismo...\n\nMelhora devagar.\n\nQuem melhora com dados...\n\nEvolui muito mais rápido.\"", stories:["Você decide baseado em...\n\n⬜ Dados\n\n⬜ Intuição", "Os números contam histórias.", "Use-os a seu favor."], whatsapp:"Olá!\n\nEstamos constantemente analisando nossos indicadores para melhorar sua experiência.\n\nObrigado por fazer parte dessa evolução.", prompt:"Crie uma legenda mostrando como decisões baseadas em dados tornam clínicas mais eficientes e centradas no paciente." },
  E16: { legenda:"Uma clínica cresce quando as pessoas aprendem.\n\nMas ela evolui de verdade quando aprender faz parte da rotina.\n\nNão espere um grande curso por ano.\n\nAprenda um pouco todos os dias.\n\nUma ideia nova.\n\nUm livro.\n\nUm podcast.\n\nUm treinamento rápido.\n\nUma conversa com a equipe.\n\nO conhecimento acumulado ao longo do tempo transforma completamente uma empresa.\n\nPorque clínicas excelentes nunca acreditam que já sabem tudo.\n\nElas continuam curiosas.\n\nO que sua equipe aprendeu esta semana?", carrossel:["Aprender não pode ser um evento.", "Precisa ser um hábito.", "Leia.", "Estude.", "Compartilhe.", "Aplique.", "Ensine.", "Aprender é evoluir."], reels:"\"Existe uma pergunta poderosa.\n\n'O que aprendemos essa semana?'\n\nQuem responde essa pergunta toda semana nunca para de crescer.\"", stories:["Sua equipe aprende continuamente?\n\n⬜ Sim\n\n⬜ Pouco", "Conhecimento gera evolução.", "Nunca pare de aprender."], whatsapp:"Olá!\n\nEstamos constantemente buscando novos conhecimentos para oferecer um atendimento ainda melhor.\n\nObrigado por confiar em nossa equipe.", prompt:"Crie uma legenda mostrando como criar uma cultura de aprendizado melhora continuamente a experiência do paciente." },
  E17: { legenda:"Quem administra apenas o presente...\n\nSempre correrá atrás.\n\nQuem constrói o futuro...\n\nSai na frente.\n\nAs clínicas que mais crescem não esperam o mercado mudar.\n\nElas observam tendências.\n\nAntecipam comportamentos.\n\nTestam novas ideias.\n\nSe preparam antes.\n\nA evolução começa quando você deixa de perguntar:\n\n\"Como está minha clínica hoje?\"\n\nE passa a perguntar:\n\n\"Como ela precisa estar daqui a cinco anos?\"\n\nSua gestão olha apenas para o mês ou para o futuro?", carrossel:["Quem olha só para hoje...", "Sempre chega depois.", "Observe tendências.", "Antecipe mudanças.", "Planeje.", "Prepare sua equipe.", "Construa o futuro.", "Pense à frente."], reels:"\"O futuro da sua clínica começa pelas decisões que você toma hoje.\"", stories:["Você planeja o futuro da clínica?\n\n⬜ Sim\n\n⬜ Pouco", "Quem planeja evolui.", "Olhe além do presente."], whatsapp:"Olá!\n\nEstamos trabalhando continuamente para preparar nossa clínica para oferecer uma experiência ainda melhor nos próximos anos.\n\nObrigado por fazer parte dessa história.", prompt:"Crie uma legenda mostrando a importância de pensar no futuro da experiência do paciente." },
  E18: { legenda:"Preço pode ser copiado.\n\nTecnologia também.\n\nEstrutura física também.\n\nMas existe algo muito mais difícil de copiar.\n\nA experiência que uma clínica entrega.\n\nEla nasce da cultura.\n\nDas pessoas.\n\nDos processos.\n\nDa liderança.\n\nDo relacionamento.\n\nÉ justamente por isso que investir em experiência é investir em um diferencial duradouro.\n\nEnquanto concorrentes brigam por preço...\n\nVocê conquista preferência.\n\nSua clínica compete por preço ou por experiência?", carrossel:["Preço muda.", "Experiência permanece.", "Relacionamento diferencia.", "Cultura diferencia.", "Pessoas diferenciam.", "Experiência fideliza.", "Esse é o verdadeiro diferencial.", "Invista em experiência."], reels:"\"Existe uma vantagem competitiva que ninguém consegue copiar facilmente.\n\nA experiência que seus pacientes vivem.\"", stories:["O que diferencia sua clínica?", "Preço acaba.\n\nExperiência permanece.", "Construa um diferencial verdadeiro."], whatsapp:"Olá!\n\nSeguimos trabalhando para oferecer uma experiência que vá além do atendimento.\n\nObrigado pela confiança.", prompt:"Crie uma legenda mostrando que experiência é uma vantagem competitiva sustentável para clínicas." },
  E19: { legenda:"Não existe cultura forte sem liderança forte.\n\nOs líderes ensinam muito mais pelo que fazem do que pelo que dizem.\n\nSe o gestor escuta pacientes...\n\nA equipe aprende a escutar.\n\nSe o gestor respeita horários...\n\nA equipe aprende a respeitar.\n\nSe o gestor trata todos com respeito...\n\nIsso se espalha pela clínica.\n\nExperiência do paciente começa pela experiência da equipe.\n\nE ambas começam pela liderança.\n\nO comportamento da sua equipe parece com o comportamento da liderança?", carrossel:["A cultura segue a liderança.", "Lidere pelo exemplo.", "Escute.", "Respeite.", "Ensine.", "Inspire.", "Repita diariamente.", "O exemplo contagia."], reels:"\"Se você quer mudar a equipe...\n\nComece olhando para a liderança.\n\nToda cultura começa pelo exemplo.\"", stories:["O líder influencia a cultura?\n\n⬜ Sim\n\n⬜ Totalmente", "Pessoas seguem exemplos.", "Lidere pelo comportamento."], whatsapp:"Olá!\n\nNossa liderança acredita que cuidar das pessoas começa pelo exemplo.\n\nObrigado por confiar em nossa equipe.", prompt:"Crie uma legenda mostrando que líderes constroem a experiência do paciente através do exemplo." },
  E20: { legenda:"No final...\n\nÉ tudo sobre evolução.\n\nNão sobre perfeição.\n\nVocê não precisa transformar sua clínica em um dia.\n\nPrecisa apenas melhorar um pouco hoje.\n\nE repetir isso amanhã.\n\nDepois de um ano...\n\nVocê terá uma clínica completamente diferente.\n\nAs melhores empresas do mundo não nasceram excelentes.\n\nElas evoluíram continuamente.\n\nE sua clínica também pode.\n\nQual pequena melhoria você pode implementar ainda hoje?", carrossel:["Não busque perfeição.", "Busque evolução.", "1% melhor hoje.", "Mais 1% amanhã.", "Repita.", "Construa excelência.", "Nunca pare.", "Evolua todos os dias."], reels:"\"Não espere o momento perfeito.\n\nComece melhorando uma coisa hoje.\n\nÉ assim que clínicas extraordinárias são construídas.\"", stories:["Qual será sua melhoria de hoje?", "Pequenas mudanças.\n\nGrandes resultados.", "Nunca pare de evoluir."], whatsapp:"Olá!\n\nSeguimos trabalhando diariamente para evoluir e oferecer uma experiência cada vez melhor para você.\n\nObrigado por caminhar conosco.", prompt:"Crie uma legenda mostrando que evolução contínua é mais importante do que buscar perfeição.\n\nTema 21 – Inovação Contínua\n\nObjetivo\n\nMostrar que inovar não significa grandes investimentos, mas melhorar continuamente a experiência do paciente.\n\nHistória\n\nExiste uma ideia de que inovação depende de tecnologia cara ou grandes projetos. Na prática, as clínicas que mais evoluem são aquelas que melhoram pequenos detalhes todos os dias. Um novo jeito de confirmar consultas, uma mensagem mais humana, um ajuste no atendimento. Pequenas melhorias constantes geram grandes resultados ao longo do tempo.\n\nLegenda\n\nMuita gente acha que inovar é comprar tecnologia.\n\nEu penso diferente.\n\nInovar é melhorar.\n\nÉ olhar para a experiência do paciente e perguntar todos os dias:\n\n\"O que podemos fazer um pouco melhor?\"\n\nÀs vezes, uma simples mudança na comunicação vale mais do que um software novo.\n\nA inovação começa quando a melhoria vira rotina.\n\nCarrossel\n\nSlide 1\nInovação não começa com tecnologia.\n\nSlide 2\nComeça com observação.\n\nSlide 3\nO paciente mostra onde melhorar.\n\nSlide 4\nPequenos ajustes geram grandes impactos.\n\nSlide 5\nMelhore uma etapa por semana.\n\nSlide 6\nDepois outra.\n\nSlide 7\nA soma dessas melhorias transforma a experiência.\n\nSlide 8\nA inovação é um hábito.\n\nReels\n\n\"Quando você ouve a palavra inovação, pensa em tecnologia? Eu penso em outra coisa. Eu penso em melhorar um detalhe por dia. É isso que transforma clínicas comuns em clínicas memoráveis.\"\n\nStories\n\nStory 1\nVocê acredita que inovação depende de tecnologia?\n\nStory 2\nÀs vezes ela depende apenas de ouvir melhor seus pacientes.\n\nStory 3\nQual pequeno processo você pode melhorar hoje?\n\nWhatsApp\n\nOlá!\n\nEstamos sempre buscando melhorar sua experiência.\n\nSe houver qualquer sugestão sobre nosso atendimento, será um prazer ouvir você.\n\nPrompt\n\nCrie cinco conteúdos mostrando como pequenas melhorias constantes geram inovação na experiência do paciente.\n\nTema 22 – Adaptabilidade\n\nObjetivo\n\nDemonstrar que clínicas de sucesso aprendem a se adaptar rapidamente às mudanças.\n\nHistória\n\nO mercado muda.\n\nOs pacientes mudam.\n\nA tecnologia muda.\n\nAs clínicas que permanecem relevantes não são as mais antigas, mas as que aprendem mais rápido.\n\nLegenda\n\nA maior vantagem competitiva hoje não é experiência.\n\nÉ capacidade de adaptação.\n\nQuem escuta o paciente evolui.\n\nQuem insiste em fazer tudo igual acaba ficando para trás.\n\nCarrossel\n\nSlide 1\nO mercado mudou.\n\nSlide 2\nO paciente mudou.\n\nSlide 3\nO atendimento também precisa mudar.\n\nSlide 4\nQuem aprende rápido cresce.\n\nSlide 5\nQuem resiste perde espaço.\n\nSlide 6\nOuça.\n\nSlide 7\nAjuste.\n\nSlide 8\nEvolua.\n\nReels\n\n\"O segredo não é fazer tudo perfeito. É perceber rápido o que precisa mudar.\"\n\nStories\n\nVocê mudou algum processo este ano?\n\nSim\n\nNão\n\nQual mudança fez mais diferença?\n\nToda evolução começa com uma decisão.\n\nWhatsApp\n\nOlá!\n\nEstamos aprimorando constantemente nosso atendimento.\n\nGostaria de saber sua opinião sobre sua experiência conosco.\n\nPrompt\n\nCrie cinco conteúdos mostrando como adaptação melhora a experiência do paciente.\n\nTema 23 – Excelência Sustentável\n\nObjetivo\n\nMostrar que excelência não é um evento, mas um padrão diário.\n\nHistória\n\nNão existe atendimento excelente por acaso.\n\nExiste processo.\n\nExiste cultura.\n\nExiste repetição.\n\nExcelência acontece quando o padrão alto deixa de depender das pessoas e passa a fazer parte da rotina.\n\nLegenda\n\nExcelência não acontece apenas nos dias bons.\n\nEla aparece principalmente nos dias difíceis.\n\nPorque excelência é processo.\n\nNão sorte.\n\nCarrossel\n\nSlide 1\nExcelência não é talento.\n\nSlide 2\nÉ repetição.\n\nSlide 3\nÉ padrão.\n\nSlide 4\nÉ cultura.\n\nSlide 5\nÉ consistência.\n\nSlide 6\nÉ melhoria.\n\nSlide 7\nÉ disciplina.\n\nSlide 8\nÉ compromisso.\n\nReels\n\n\"Excelência não é fazer perfeito uma vez. É conseguir repetir o bom atendimento todos os dias.\"\n\nStories\n\nExcelência depende de pessoas?\n\n↓\n\nOu de processos?\n\nO melhor atendimento é aquele que pode ser repetido.\n\nWhatsApp\n\nOlá!\n\nNosso compromisso é oferecer sempre a melhor experiência possível.\n\nObrigado por fazer parte dessa evolução.\n\nPrompt\n\nCrie conteúdos mostrando como processos sustentam a excelência em clínicas.\n\nTema 24 – Legado da Experiência\n\nObjetivo\n\nLevar a clínica a pensar no impacto que deseja deixar nos pacientes.\n\nHistória\n\nToda clínica deixa uma marca.\n\nA pergunta é:\n\nEla será lembrada apenas pelo tratamento realizado?\n\nOu pela forma como fez cada paciente se sentir?\n\nLegenda\n\nNo fim do dia, as pessoas esquecem muitos detalhes.\n\nMas dificilmente esquecem como foram tratadas.\n\nEsse é o verdadeiro legado de uma clínica.\n\nCarrossel\n\nSlide 1\nQue marca sua clínica deixa?\n\nSlide 2\nResultados importam.\n\nSlide 3\nExperiências também.\n\nSlide 4\nPacientes lembram de sentimentos.\n\nSlide 5\nConfiança gera lembrança.\n\nSlide 6\nCuidado gera vínculo.\n\nSlide 7\nVínculo gera indicação.\n\nSlide 8\nEsse é o verdadeiro legado.\n\nReels\n\n\"Qual será a lembrança que seu paciente terá da sua clínica daqui a cinco anos?\"\n\nStories\n\nComo você gostaria que seus pacientes lembrassem da sua clínica?\n\nExperiência também constrói legado.\n\nWhatsApp\n\nOlá!\n\nEsperamos que sua experiência conosco tenha sido marcante.\n\nObrigado por confiar em nosso trabalho.\n\nPrompt\n\nCrie conteúdos mostrando como experiências positivas constroem o legado de uma clínica.\n\nTema 25 – O Ciclo CORE (Encerramento da Metodologia)\n\nObjetivo\n\nApresentar o CORE como um ciclo contínuo de evolução e consolidar toda a metodologia.\n\nHistória\n\nExperiência do paciente não termina após uma consulta.\n\nEla também não termina após implantar um processo.\n\nEla é um ciclo.\n\nVocê conhece melhor seus pacientes.\n\nOrganiza melhor sua operação.\n\nConstrói relacionamento.\n\nEvolui continuamente.\n\nDepois recomeça.\n\nEsse é o Método CORE.\n\nLegenda\n\nNenhuma clínica alcança excelência de uma vez.\n\nEla evolui em ciclos.\n\nConhece melhor seus pacientes.\n\nOrganiza seus processos.\n\nFortalece relacionamentos.\n\nE continua evoluindo.\n\nEsse é o Método CORE.\n\nE esse ciclo nunca termina.\n\nCarrossel\n\nSlide 1\nO Método CORE é um ciclo.\n\nSlide 2\nConhecimento do Cliente.\n\nSlide 3\nExcelência Operacional.\n\nSlide 4\nRelacionamento e Fidelização.\n\nSlide 5\nEvolução e Experiência.\n\nSlide 6\nCada etapa fortalece a próxima.\n\nSlide 7\nQuando o ciclo recomeça, a clínica evolui novamente.\n\nSlide 8\nExperiência não é destino.\n\nÉ um processo contínuo.\n\nReels\n\n\"Depois de percorrer os quatro pilares do Método CORE, talvez você tenha percebido uma coisa: experiência do paciente não é um projeto com começo, meio e fim. Ela é um ciclo contínuo de melhoria.\"\n\nStories\n\nStory 1\n\nO CORE não é uma checklist.\n\nStory 2\n\nÉ um ciclo de evolução.\n\nStory 3\n\nQuanto mais você aplica, melhor fica a experiência do seu paciente.\n\nWhatsApp\n\nOlá!\n\nObrigado por fazer parte da nossa jornada.\n\nSeguiremos evoluindo continuamente para oferecer uma experiência cada vez melhor.\n\nConte sempre conosco.\n\nPrompt\n\nCrie conteúdos explicando o Método CORE como um ciclo contínuo de melhoria da experiência do paciente, conectando os quatro pilares e incentivando a aplicação prática da metodologia." },
